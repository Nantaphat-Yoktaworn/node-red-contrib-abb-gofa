<script type="text/javascript">
    RED.nodes.registerType('gofa-subscribe-elog', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:        { value: '' },
            robot:       { value: '', type: 'gofa-robot', required: true },
            domain:      { value: '1' },
            minSeverity: { value: '1' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Subscribe Event Log'; },
        paletteLabel: 'Subscribe Event Log'
    });
</script>
<script type="text/html" data-template-name="gofa-subscribe-elog">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-domain"><i class="fa fa-list"></i> Domain</label>
        <select id="node-input-domain">
            <option value="0">Common</option>
            <option value="1">Operational</option>
            <option value="2">System</option>
            <option value="3">Hardware</option>
            <option value="4">Program</option>
            <option value="5">Motion</option>
            <option value="7">IO &amp; Communication</option>
            <option value="8">User</option>
            <option value="9">Safety</option>
            <option value="10">Internal</option>
            <option value="11">Process</option>
            <option value="12">Configuration</option>
            <option value="13">Paint</option>
            <option value="15">RAPID</option>
            <option value="17">ConnectedServices</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-minSeverity"><i class="fa fa-exclamation-triangle"></i> Min Severity</label>
        <select id="node-input-minSeverity">
            <option value="1">All (info+)</option>
            <option value="2">Warning+</option>
            <option value="3">Error only</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Subscribe Event Log">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-subscribe-elog">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Pushes new controller event log entries in real time over an RWS WebSocket subscription — a live feed, unlike <code>gofa-elog</code>'s poll-on-demand read.</p>
    <p><b>Domain is a category, not a severity filter</b> — each entry belongs to exactly one domain (e.g. Safety, Motion, RAPID) regardless of whether it's info/warning/error. Use <b>Min Severity</b> to filter by severity instead; combine both if you want e.g. "errors only, from the Safety domain." The domain list above was confirmed live against this project's controller (<code>GET /rw/elog</code>) — a different controller/RobotWare configuration could expose a different set. Entries below the Min Severity threshold are silently dropped (not emitted), not treated as an error.</p>
    <h3>Input</h3>
    <p>Send any message to (re)start the subscription. Further injects while already connected are a no-op — the node keeps streaming.</p>
    <h3>Output <code>msg.payload</code></h3>
    <pre>msg.payload = {
  ok: true,
  domain: 1,
  entry: { seqnum, msgtype, code, title, tstamp }
}</pre>
    <p><code>msgtype</code>: <code>1</code>=info, <code>2</code>=warning, <code>3</code>=error.</p>
    <p>One message is emitted per new event log entry that meets Min Severity (the subscription push only carries a reference; this node fetches the full entry before emitting).</p>
</script>
