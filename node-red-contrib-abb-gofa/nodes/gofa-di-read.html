<script type="text/javascript">
    RED.nodes.registerType('gofa-di-read', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            signal: { value: 'ABB_Scalable_IO_0_DI1' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || ('DI ' + this.signal); },
        paletteLabel: 'DI Read',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function fetchDiValue() {
                var id = robotId();
                var sig = $('#node-input-signal').val() || '';
                if (!id) {
                    $('#gofa-di-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                if (!sig) {
                    $('#gofa-di-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Enter a signal name first</span>');
                    return;
                }
                var btn = $('#gofa-di-fetch').prop('disabled', true);
                $('#gofa-di-result').html('<i class="fa fa-spinner fa-spin"></i> Reading...');
                $.getJSON('gofa-di-read/' + id + '/read', { signal: sig })
                    .done(function(data) {
                        var color = data.value === 1 ? '#5cb85c' : '#777';
                        var html = '<div style="display: flex; align-items: center;">' +
                            '<span style="display: inline-block; width: 16px; height: 16px; border-radius: 50%; background-color: ' + color + '; margin-right: 8px; border: 1px solid #444;"></span>' +
                            '<span><b>Value:</b> ' + data.value + '</span>' +
                            '</div>';
                        $('#gofa-di-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to read signal';
                        $('#gofa-di-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            function populateSignalDropdown() {
                var id = robotId();
                var sel = $('#node-input-signalSelect');
                sel.empty().append($('<option>', { value: '', text: 'Other (type below)' }));
                if (!id) return;
                $.getJSON('gofa-di-read/' + id + '/signals')
                    .done(function(data) {
                        var current = $('#node-input-signal').val();
                        sel.empty().append($('<option>', { value: '', text: 'Other (type below)' }));
                        (data.signals || []).forEach(function(s) {
                            sel.append($('<option>', { value: s.name, text: s.name }));
                        });
                        if (current && (data.signals || []).some(function(s) { return s.name === current; })) {
                            sel.val(current);
                        }
                    });
            }
            $('#node-input-signalSelect').on('change', function() {
                var v = $(this).val();
                if (v) {
                    $('#node-input-signal').val(v).trigger('change');
                }
            });
            $('#node-input-robot').on('change', populateSignalDropdown);
            $('#gofa-di-fetch').on('click', function(e) {
                e.preventDefault();
                fetchDiValue();
            });
            // Initial load
            populateSignalDropdown();
            fetchDiValue();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-di-read">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-signalSelect"><i class="fa fa-list"></i> Known Signals</label>
        <select id="node-input-signalSelect" style="width:70%"></select>
    </div>
    <div class="form-row">
        <label for="node-input-signal"><i class="fa fa-bolt"></i> Signal</label>
        <input type="text" id="node-input-signal" placeholder="ABB_Scalable_IO_0_DI1">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Live Read</label>
        <button id="gofa-di-fetch" class="editor-button" style="width: auto;"><i class="fa fa-refresh"></i> Read Value</button>
    </div>
    <div class="form-row">
        <div id="gofa-di-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 40px; display: flex; align-items: center;">
            Select a robot and click Read Value.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-di-read">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads a digital input (DI) signal from the ABB GoFa controller via RWS.</p>
    <p>The <b>Known Signals</b> dropdown lists live DI signals from the controller — pick one to fill the Signal field, or leave it on "Other (type below)" and type a name manually as before.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A string — used as the signal name (overrides configured value)</li>
        <li><code>null</code> / not set — uses the configured signal name</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, signal: 'ABB_Scalable_IO_0_DI1', value: 0 }</code> on success (value is 0 or 1).</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
