<script type="text/javascript">
    RED.nodes.registerType('gofa-subscribe-pose', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:     { value: '' },
            robot:    { value: '', type: 'gofa-robot', required: true },
            interval: { value: 500 }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Subscribe Pose'; },
        paletteLabel: 'Subscribe Pose'
    });
</script>
<script type="text/html" data-template-name="gofa-subscribe-pose">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-interval"><i class="fa fa-clock-o"></i> Interval (ms)</label>
        <input type="number" id="node-input-interval" placeholder="500">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Subscribe Pose">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-subscribe-pose">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Polls the controller for the current TCP pose (robtarget) of ROB_1. Each input message toggles polling on or off.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            On <b>start</b> only:
            <ul>
                <li><b>{ interval: 2000 }</b> — override poll rate in ms (minimum 100)</li>
                <li><b>(absent)</b> — uses the <em>Interval</em> property (default: 500 ms)</li>
            </ul>
            On <b>stop</b>: payload is ignored.
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload.ok <span class="property-type">boolean</span></dt>
        <dd><code>true</code></dd>
        <dt>payload.x, payload.y, payload.z <span class="property-type">number</span></dt>
        <dd>TCP position in mm (base frame)</dd>
        <dt>payload.q1, payload.q2, payload.q3, payload.q4 <span class="property-type">number</span></dt>
        <dd>TCP orientation as quaternion</dd>
    </dl>

    <h3>Notes</h3>
    <p>To change the poll rate without redeploying, stop the node first (one inject), then start it again with <code>{ interval: N }</code> (another inject).</p>
</script>
