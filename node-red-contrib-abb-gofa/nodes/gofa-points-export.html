<script type="text/javascript">
    RED.nodes.registerType('gofa-points-export', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:     { value: '' },
            robot:    { value: '', type: 'gofa-robot', required: true },
            savePath: { value: '' }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || 'Points Export'; },
        paletteLabel: 'Points Export'
    });
</script>
<script type="text/html" data-template-name="gofa-points-export">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Points Export">
    </div>
    <div class="form-row">
        <label for="node-input-savePath"><i class="fa fa-save"></i> Save to file</label>
        <input type="text" id="node-input-savePath" placeholder="Leave blank to skip file save (e.g. /home/user/points_backup.json)">
    </div>
</script>
<script type="text/html" data-help-name="gofa-points-export">
    <p>Exports the saved points list from the robot config node. Optionally writes the list to a file on the Node-RED host.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>
            <ul>
                <li><b>string</b> — file path to save to, e.g. <code>'/data/points_backup.json'</code></li>
                <li><b>object</b> — <code>{ savePath: '/data/points_backup.json' }</code></li>
                <li><b>(absent)</b> — uses the <em>Save to file</em> property (empty = no file write)</li>
            </ul>
            Legacy: <code>msg.savePath</code> (string) is still accepted as a fallback.
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload.ok <span class="property-type">boolean</span></dt>
        <dd><code>true</code> on success.</dd>
        <dt>payload.count <span class="property-type">number</span></dt>
        <dd>Number of points exported.</dd>
        <dt>payload.points <span class="property-type">array</span></dt>
        <dd>Array of point objects, each with <code>id</code>, <code>name</code>, and <code>target</code>.</dd>
        <dt>payload.savedTo <span class="property-type">string</span></dt>
        <dd>Path the file was written to (only present when a save path is used).</dd>
    </dl>

    <h3>Notes</h3>
    <p>Points are stored on the Node-RED host (not on the controller). Use <b>gofa-points-import</b> to restore a saved file.</p>
</script>
