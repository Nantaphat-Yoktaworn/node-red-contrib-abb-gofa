<script type="text/javascript">
    RED.nodes.registerType('gofa-ai-read', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            signal: { value: 'AI1' }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || ('AI ' + this.signal); },
        paletteLabel: 'AI Read'
    });
</script>
<script type="text/html" data-template-name="gofa-ai-read">
    <div class="form-row" style="background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:8px;margin-bottom:8px;">
        <i class="fa fa-exclamation-triangle" style="color:#856404;"></i>
        <span style="color:#856404;font-weight:bold;"> Requires external I/O module</span><br>
        <span style="color:#856404;font-size:0.9em;">Signal will not exist (HTTP 404) unless an analog I/O expansion module is fitted to the controller.</span>
    </div>
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-signal"><i class="fa fa-bolt"></i> Signal</label>
        <input type="text" id="node-input-signal" placeholder="AI1">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
</script>
<script type="text/html" data-help-name="gofa-ai-read">
    <p><b>⚠ Requires external I/O module.</b> Analog input signals (AI) do not exist on the base OmniCore C30 — an expansion I/O module must be fitted and configured. Without it, this node returns HTTP 404.</p>
    <p>Reads an analog input (AI) signal from the ABB GoFa controller via RWS.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A string — used as the signal name (overrides configured value)</li>
        <li><code>null</code> / not set — uses the configured signal name</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, signal: 'AI1', value: 2.75 }</code> on success (value is a float).</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
