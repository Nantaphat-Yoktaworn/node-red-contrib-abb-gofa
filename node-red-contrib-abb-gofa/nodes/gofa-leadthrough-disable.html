<script type="text/html" data-template-name="gofa-leadthrough-disable">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Leadthrough Disable">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">

<script type="text/html" data-help-name="gofa-leadthrough-disable">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Disables robot hand-guiding (leadthrough) mode via RWS.</p>
    <p>Sends <code>POST /rw/motionsystem/mechunits/ROB_1/lead-through</code>, body
    <code>status=inactive</code>, to the controller.</p>
    <h3>Input</h3>
    <p>Any message triggers the action. <code>msg.payload</code> is ignored.</p>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload.ok <span class="property-type">boolean</span></dt>
        <dd><code>true</code> on success.</dd>
        <dt>payload.error <span class="property-type">string</span></dt>
        <dd>Present on failure — the error message from RWS.</dd>
    </dl>
    <h3>Notes</h3>
    <p>Hand-guiding requires the SafeMove2 Pro option on the OmniCore C30 controller. A 404 response typically indicates this option is not licensed.</p>
</script>
