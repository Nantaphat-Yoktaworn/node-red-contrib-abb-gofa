    RED.nodes.registerType('gofa-leadthrough-enable', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true }
        },

    });
</script>
<script type="text/html" data-template-name="gofa-leadthrough-enable">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Leadthrough Enable">
    </div>
</script>
<script type="text/html" data-help-name="gofa-leadthrough-enable">
    <p>Enables robot hand-guiding (leadthrough) mode via RWS.</p>
    <p>Sends <code>POST /rw/motionsystem/mechunits/ROB_1/handguiding?action=start</code> to the controller.</p>
    <h3>Input</h3>
    <p>Any message triggers the action. <code>msg.payload</code> is ignored.</p>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload.ok <span class="property-type">boolean</span></dt>
        <dd><code>true</code> on success.</dd>
        <dt>payload.error <span class="property-type">string</span></dt>
        <dd>Present on failure — the error message from RWS.</dd>
        <dt>payload.hint <span class="property-type">string</span></dt>
        <dd>Present on failure — a hint about the cause (e.g. missing SafeMove2 Pro option on 404).</dd>
    </dl>
    <h3>Notes</h3>
    <p>Hand-guiding requires the SafeMove2 Pro option on the OmniCore C30 controller. A 404 response typically indicates this option is not licensed.</p>
</script>
