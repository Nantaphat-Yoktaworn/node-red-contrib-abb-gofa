<script type="text/javascript">
    RED.nodes.registerType('gofa-status', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false }, name: { value:'' }, robot: { value:'', type:'gofa-robot', required:true } },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Robot Status'; },
        paletteLabel: 'Robot Status',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function updateStatus() {
                var id = robotId();
                if (!id) {
                    $('#gofa-status-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                var btn = $('#gofa-status-fetch').prop('disabled', true);
                $('#gofa-status-result').html('<i class="fa fa-spinner fa-spin"></i> Fetching...');
                $.getJSON('gofa-status/' + id + '/read')
                    .done(function(data) {
                        var html = '<table class="red-ui-info-table" style="width: 100%; border-collapse: collapse;">' +
                            '<tr><td style="font-weight: bold; padding: 4px; width: 40%;">Control State</td><td style="padding: 4px;">' + data.ctrlstate + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Operation Mode</td><td style="padding: 4px;">' + data.opmode + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Speed Ratio</td><td style="padding: 4px;">' + data.speed + '%</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">RAPID Execution</td><td style="padding: 4px;">' + data.rapid + '</td></tr>' +
                            '</table>';
                        $('#gofa-status-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to fetch status';
                        $('#gofa-status-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            $('#gofa-status-fetch').on('click', function(e) {
                e.preventDefault();
                updateStatus();
            });
            // Initial load
            updateStatus();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-status">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Live Status</label>
        <button id="gofa-status-fetch" class="editor-button" style="width: auto;"><i class="fa fa-refresh"></i> Fetch Status</button>
    </div>
    <div class="form-row">
        <div id="gofa-status-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 50px;">
            Select a robot and click Fetch Status.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Robot Status">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-status">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads controller status on each input message. <code>msg.payload</code> itself is
    ignored on input.</p>
    <h3>Output <code>msg.payload</code></h3>
    <p>Success:</p>
    <dl class="message-properties">
        <dt>ok</dt><dd>true</dd>
        <dt>ctrlstate</dt><dd>motoron | guardstop | emergencystop | sysfail</dd>
        <dt>opmode</dt><dd>AUTO | MANR</dd>
        <dt>speed</dt><dd>FlexPendant/production-window speed override 0-100 (RWS <code>speedratio</code>) — a
        separate value from <b>gofa-speed-set</b>'s override (RAPID <code>VelSet</code>); reading this does
        not confirm what gofa-speed-set last set, see CLAUDE.md's <code>SPEED</code>/<code>SpeedRefresh</code> note</dd>
        <dt>rapid</dt><dd>running | stopped</dd>
    </dl>
    <p>Failure: <code>msg.payload = { ok: false, error: "..." }</code></p>
</script>
