<script type="text/javascript">
    RED.nodes.registerType('gofa-move', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:    { value:'' },
            robot:   { value:'', type:'gofa-robot', required:true },
            command: { value:'HOME' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || this.command || 'Move'; },
        paletteLabel: 'Move Home'
    });
</script>
<script type="text/html" data-template-name="gofa-move">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-command"><i class="fa fa-home"></i> Command</label>
        <select id="node-input-command">
            <option value="HOME">HOME — move to home position</option>
            <option value="SETHOME">SETHOME — set current pose as home</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Move Home">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-move">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Sends <code>HOME</code> or <code>SETHOME</code> to the robot via the RAPID socket server (port 1025).</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>
            <ul>
                <li><b>string</b> — <code>'HOME'</code> or <code>'SETHOME'</code></li>
                <li><b>object</b> — <code>{ command: 'HOME' }</code></li>
                <li><b>(absent)</b> — uses the <em>Command</em> dropdown (default: <code>HOME</code>)</li>
            </ul>
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Success: <code>{ ok: true, ack: 'OK:HOME' }</code> (<code>ok</code> reflects whether
        the socket ack itself started with <code>OK:</code>). Failure (invalid command or
        socket error): <code>{ ok: false, error: '...' }</code> — no <code>ack</code> property.</dd>
    </dl>

    <h3>Notes</h3>
    <p><code>SETHOME</code> captures the current TCP pose and persists it to <code>HOME:/Programs/gofa_home.cfg</code> on the controller.</p>
</script>
