<script type="text/javascript">
    RED.nodes.registerType('gofa-zone-set', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true },
            zone:  { value: 'z10' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || ('Zone ' + this.zone); },
        paletteLabel: 'Zone Set',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }

            function applyZone() {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                var zone = $('#node-input-zone').val() || 'z10';

                var btn = $('#gofa-zone-btn').prop('disabled', true);
                RED.notify('Setting motion zone...', 'info');

                $.ajax({
                    url: 'gofa-zone-set/' + id + '/set',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ zone: zone })
                })
                    .done(function(data) {
                        RED.notify('Motion zone set to ' + data.zone + ' successfully', 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to set zone';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-zone-btn').on('click', function(e) {
                e.preventDefault();
                applyZone();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-zone-set">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-zone"><i class="fa fa-crosshairs"></i> Zone</label>
        <select id="node-input-zone" style="width:70%">
            <option value="fine">fine — stop precisely at point</option>
            <option value="z1">z1 — 1 mm radius</option>
            <option value="z5">z5 — 5 mm radius</option>
            <option value="z10">z10 — 10 mm radius</option>
            <option value="z20">z20 — 20 mm radius</option>
            <option value="z50">z50 — 50 mm radius</option>
            <option value="z100">z100 — 100 mm radius</option>
        </select>
    </div>
    <div class="form-row">
        <button id="gofa-zone-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-crosshairs"></i> Set Zone Now</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Zone Set">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-zone-set">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Sets the active motion zone (fly-by radius) on the robot via the RAPID socket server (<code>ZONE</code> command).</p>
    <p>The properties panel has a <b>Set Zone Now</b> button that sends the same <code>ZONE</code>
    command for the selected dropdown value directly from the editor, without deploying/
    triggering the node at runtime.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be a string zone name (fine/z1/z5/z10/z20/z50/z100) to override the configured value.
    Pass <code>null</code> or omit to use the configured default.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, zone: 'z10' }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
