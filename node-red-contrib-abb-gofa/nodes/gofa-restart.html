<script type="text/javascript">
    RED.nodes.registerType('gofa-restart', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name: { value:'' },
            robot: { value:'', type:'gofa-robot', required:true },
            mode: { value:'restart' }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || 'Restart Controller'; },
        paletteLabel: 'Restart Controller'
    });
</script>
<script type="text/html" data-template-name="gofa-restart">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-refresh"></i> Mode</label>
        <select id="node-input-mode">
            <option value="restart">Warm Start (restart)</option>
            <option value="pstart">P-Start (discard RAPID)</option>
            <option value="istart">I-Start (clean restore)</option>
            <option value="xstart">X-Start (boot application)</option>
            <option value="bstart">B-Start (load backup state)</option>
            <option value="shutdown">Shutdown</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Restart Controller">
    </div>
</script>
<script type="text/html" data-help-name="gofa-restart">
    <p>Restarts or shuts down the robot controller via RWS. Gated by controller-level UAS grants.</p>
    
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">payload <span class="property-type">string | object</span></dt>
        <dd>If string, overrides the configured restart mode. If object, the <code>msg.payload.mode</code> property overrides the restart mode.</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Output shape: <code>{ ok: true, mode: "restart" }</code> on success, or <code>{ ok: false, error: "..." }</code> on failure.</dd>
    </dl>
</script>
