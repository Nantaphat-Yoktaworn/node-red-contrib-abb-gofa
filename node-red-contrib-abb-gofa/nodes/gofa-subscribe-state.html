<script type="text/javascript">
    RED.nodes.registerType('gofa-subscribe-state', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || 'Subscribe State'; },
        paletteLabel: 'Subscribe State'
    });
</script>
<script type="text/html" data-template-name="gofa-subscribe-state">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Subscribe State">
    </div>
</script>
<script type="text/html" data-help-name="gofa-subscribe-state">
    <p>Subscribes to controller state changes via RWS WebSocket. Send any message to start the subscription; the node then outputs a message each time the controller state changes.</p>
    <h3>Output <code>msg.payload</code></h3>
    <dl class="message-properties">
        <dt>ok <span class="property-type">boolean</span></dt><dd><code>true</code></dd>
        <dt>state <span class="property-type">string</span></dt>
        <dd>Current controller state: <code>motoron</code> | <code>motoroff</code> | <code>guardstop</code> | <code>emergencystop</code> | <code>emergencystopreset</code> | <code>sysfail</code></dd>
    </dl>
    <h3>Notes</h3>
    <p>The subscription is started on the first input message and remains active until the flow is redeployed or Node-RED stops. Subsequent input messages are ignored while a subscription is active.</p>
</script>
