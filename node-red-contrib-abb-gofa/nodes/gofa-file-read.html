<script type="text/javascript">
    RED.nodes.registerType('gofa-file-read', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:       { value: '' },
            robot:      { value: '', type: 'gofa-robot', required: true },
            remotePath: { value: '$HOME/Programs/MainModule.mod' },
            encoding:   { value: 'utf8' }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || 'File Read'; },
        paletteLabel: 'File Read'
    });
</script>
<script type="text/html" data-template-name="gofa-file-read">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-remotePath"><i class="fa fa-file"></i> Remote path</label>
        <input type="text" id="node-input-remotePath" placeholder="$HOME/Programs/MainModule.mod">
    </div>
    <div class="form-row">
        <label for="node-input-encoding"><i class="fa fa-font"></i> Encoding</label>
        <select id="node-input-encoding">
            <option value="utf8">UTF-8 (text)</option>
            <option value="base64">Base64 (binary)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="File Read">
    </div>
</script>
<script type="text/html" data-help-name="gofa-file-read">
    <p>Reads a file from the robot controller filesystem via RWS fileservice.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A string — used as the remote path</li>
        <li>An object <code>{ remotePath, encoding }</code> — overrides config</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload</code> — <code>{ ok, remotePath, content, bytes }</code></p>
    <p><code>content</code> is a UTF-8 string or Base64 string depending on encoding.</p>
    <h3>Common paths</h3>
    <ul>
        <li><code>$HOME/Programs/MainModule.mod</code> — main RAPID module</li>
        <li><code>$HOME/Programs/gofa_home.cfg</code> — saved home position</li>
    </ul>
</script>
