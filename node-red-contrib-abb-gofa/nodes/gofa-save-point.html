<script type="text/javascript">
    RED.nodes.registerType('gofa-save-point', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:      { value: '' },
            robot:     { value: '', type: 'gofa-robot', required: true },
            pointName: { value: '' },
            storage:   { value: 'local' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Save Point'; },
        paletteLabel: 'Save Point',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function savePoint() {
                var id = robotId();
                var pointName = $('#node-input-pointName').val() || '';
                var storage = $('#node-input-storage').val() || 'local';
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                var btn = $('#gofa-save-point-btn').prop('disabled', true);
                RED.notify('Saving point...', 'info');

                $.ajax({
                    url: 'gofa-save-point/' + id + '/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ pointName: pointName, storage: storage })
                })
                    .done(function(data) {
                        RED.notify('Point "' + data.point.name + '" saved successfully!', 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to save point';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-save-point-btn').on('click', function(e) {
                e.preventDefault();
                savePoint();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-save-point">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-pointName"><i class="fa fa-map-marker"></i> Point Name</label>
        <input type="text" id="node-input-pointName" placeholder="Leave blank for auto-name">
    </div>
    <div class="form-row">
        <label for="node-input-storage"><i class="fa fa-database"></i> Storage</label>
        <select id="node-input-storage">
            <option value="local">Local (points.json)</option>
            <option value="remote">On-Robot</option>
        </select>
    </div>
    <div class="form-row">
        <button id="gofa-save-point-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-map-marker"></i> Save Current Pose</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Save Point">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-save-point">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads the current TCP pose and saves it as a named point.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> as a plain string is used directly as the point name;
    <code>msg.payload.name</code> overrides the Point Name property if <code>msg.payload</code> is
    an object; <code>msg.payload.storage</code> (<code>"local"</code>/<code>"remote"</code>)
    overrides the <em>Storage</em> setting. A blank name (default) auto-generates
    <code>"Point N"</code>.</p>
    <h3>Storage</h3>
    <p><b>Local</b> — the config node's Points File on the Node-RED host (default). <b>On-Robot</b> —
    a JSON file on the robot controller's own disk (the config node's Remote Points Path), managed
    via RWS <code>fileservice</code> — no local file needed on the Node-RED host.</p>
    <h3>Output <code>msg.payload</code></h3>
    <p>Success:</p>
    <dl class="message-properties">
        <dt>ok</dt><dd>true</dd>
        <dt>point</dt><dd>{ id, name, target }</dd>
        <dt>points</dt><dd>Full updated points list</dd>
    </dl>
    <p>Failure: <code>msg.payload = { ok: false, error: "..." }</code></p>
</script>
