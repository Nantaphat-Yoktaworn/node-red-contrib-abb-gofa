<script type="text/javascript">
    RED.nodes.registerType('gofa-rapid-var-write', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:     { value: '' },
            robot:    { value: '', type: 'gofa-robot', required: true },
            variable: { value: '' },
            value:    { value: '' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || this.variable || 'RAPID Var Write'; },
        paletteLabel: 'RAPID Var Write',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function writeVariable() {
                var id = robotId();
                var variable = $('#node-input-variable').val() || '';
                var value = $('#node-input-value').val();
                
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');
                if (!variable) return RED.notify('Enter a variable name first', 'warning');

                var btn = $('#gofa-var-write-btn').prop('disabled', true);
                RED.notify('Sending SETVAR to robot...', 'info');

                $.ajax({
                    url: 'gofa-rapid-var-write/' + id + '/write',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ variable: variable, value: value })
                })
                    .done(function(data) {
                        RED.notify('Variable "' + data.variable + '" successfully written with "' + data.value + '"', 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to write variable';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-var-write-btn').on('click', function(e) {
                e.preventDefault();
                writeVariable();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-rapid-var-write">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-variable"><i class="fa fa-pencil"></i> Variable</label>
        <input type="text" id="node-input-variable" placeholder="nTestVar">
    </div>
    <div class="form-row">
        <label for="node-input-value"><i class="fa fa-tag"></i> Value</label>
        <input type="text" id="node-input-value" placeholder="0">
    </div>
    <div class="form-row">
        <button id="gofa-var-write-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-pencil"></i> Write Variable Now</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="RAPID Var Write">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-rapid-var-write">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Writes a value to a RAPID PERS variable via the TCP socket server (<code>SETVAR:&lt;name&gt;:&lt;value&gt;</code>).</p>
    <p>The variable must be listed in <code>TrySetVar</code> inside <code>MainModule.mod</code>. Built-in variables: <code>nTestVar</code> (num) and <code>sTestMsg</code> (string).</p>
    <h3>Configuration</h3>
    <ul>
        <li><b>Variable</b> — variable name as declared in RAPID (e.g. <code>nTestVar</code>)</li>
        <li><b>Value</b> — default value to write</li>
    </ul>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A plain value (string, number) — written directly to the variable</li>
        <li>An object <code>{ variable, value }</code> — overrides any configured field</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, variable: "nTestVar", value: "42" }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "ERR:UNKNOWN_VAR..." }</code> on failure.</p>
    <h3>Adding more variables</h3>
    <p>To expose another RAPID variable, add a matching <code>ELSEIF varname = "MYVAR"</code> block in <code>TryGetVar</code> and <code>TrySetVar</code> in <code>MainModule.mod</code>, then re-upload and reload the module.</p>
</script>
