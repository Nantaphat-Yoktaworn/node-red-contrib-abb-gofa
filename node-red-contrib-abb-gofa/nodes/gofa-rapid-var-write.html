            variable: { value: '' },

        },

<script type="text/html" data-template-name="gofa-rapid-var-write">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-variable"><i class="fa fa-pencil"></i> Variable</label>

    <div class="form-row">

        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">

</script>
<script type="text/html" data-help-name="gofa-rapid-var-write">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Writes a value to a RAPID PERS variable via the TCP socket server (<code>SETVAR:&lt;name&gt;:&lt;value&gt;</code>).</p>
    <p>The variable must be listed in <code>TrySetVar</code> inside <code>MainModule.mod</code>. Built-in variables: <code>nTestVar</code> (num) and <code>sTestMsg</code> (string).</p>
    <h3>Configuration</h3>
    <ul>
        <li><b>Variable</b> — variable name as declared in RAPID (e.g. <code>nTestVar</code>)</li>
        <li><b>Value</b> — default value to write</li>
    </ul>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A plain value (string, number) — written directly to the variable</li>
        <li>An object <code>{ variable, value }</code> — overrides any configured field</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, variable: "nTestVar", value: "42" }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "ERR:UNKNOWN_VAR..." }</code> on failure.</p>
    <h3>Adding more variables</h3>
    <p>To expose another RAPID variable, add a matching <code>ELSEIF varname = "MYVAR"</code> block in <code>TryGetVar</code> and <code>TrySetVar</code> in <code>MainModule.mod</code>, then re-upload and reload the module.</p>
</script>
