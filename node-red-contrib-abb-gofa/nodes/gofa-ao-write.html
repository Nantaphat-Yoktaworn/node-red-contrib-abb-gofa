<script type="text/javascript">
    RED.nodes.registerType('gofa-ao-write', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            signal: { value: 'AO1' },
            value:  { value: 0.0 }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || ('AO ' + this.signal); },
        paletteLabel: 'AO Write'
    });
</script>
<script type="text/html" data-template-name="gofa-ao-write">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-signal"><i class="fa fa-bolt"></i> Signal</label>
        <input type="text" id="node-input-signal" placeholder="AO1">
    </div>
    <div class="form-row">
        <label for="node-input-value"><i class="fa fa-sliders"></i> Value</label>
        <input type="number" id="node-input-value" step="any" placeholder="0.0">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
</script>
<script type="text/html" data-help-name="gofa-ao-write">
    <p>Writes an analog output (AO) signal on the ABB GoFa controller via RWS.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A number — value to write to the configured signal</li>
        <li>An object <code>{ signal: 'AO1', value: 3.5 }</code> — overrides both signal name and value</li>
        <li><code>null</code> / not set — uses the configured defaults</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, signal: 'AO1', value: 3.5 }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
