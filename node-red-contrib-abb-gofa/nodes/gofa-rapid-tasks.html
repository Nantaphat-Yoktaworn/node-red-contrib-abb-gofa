<script type="text/javascript">
    RED.nodes.registerType('gofa-rapid-tasks', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true },
            task:  { value: 'T_ROB1' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'RAPID Tasks'; },
        paletteLabel: 'RAPID Tasks',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }

            function fetchTasks() {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                var task = $('#node-input-task').val() || 'T_ROB1';

                var btn = $('#gofa-rapid-tasks-btn').prop('disabled', true);
                $('#gofa-rapid-tasks-result').html('<i class="fa fa-spinner fa-spin"></i> Reading...');

                $.ajax({
                    url: 'gofa-rapid-tasks/' + id + '/read',
                    type: 'GET',
                    data: { task: task }
                })
                    .done(function(data) {
                        RED.notify('RAPID tasks fetched successfully', 'success');
                        var html = '<h4>Tasks:</h4><table class="red-ui-info-table" style="width:100%; margin-bottom:10px;">';
                        html += '<thead><tr><th>Name</th><th>Type</th><th>State</th><th>Execution</th></tr></thead><tbody>';
                        (data.tasks || []).forEach(function(t) {
                            html += '<tr><td><b>' + t.name + '</b></td><td>' + (t.type || '-') + '</td><td>' + (t.taskstate || '-') + '</td><td>' + (t.excstate || '-') + '</td></tr>';
                        });
                        html += '</tbody></table>';

                        html += '<h4>Modules in ' + data.task + ':</h4><table class="red-ui-info-table" style="width:100%;">';
                        html += '<thead><tr><th>Module Name</th><th>Type</th></tr></thead><tbody>';
                        (data.modules || []).forEach(function(m) {
                            html += '<tr><td><b>' + m.name + '</b></td><td>' + (m.type || '-') + '</td></tr>';
                        });
                        html += '</tbody></table>';

                        $('#gofa-rapid-tasks-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to fetch tasks';
                        RED.notify(err, 'error');
                        $('#gofa-rapid-tasks-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-rapid-tasks-btn').on('click', function(e) {
                e.preventDefault();
                fetchTasks();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-rapid-tasks">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-task"><i class="fa fa-list"></i> Task</label>
        <input type="text" id="node-input-task" placeholder="T_ROB1">
    </div>
    <div class="form-row">
        <button id="gofa-rapid-tasks-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-list"></i> Fetch Tasks & Modules</button>
    </div>
    <div class="form-row">
        <div id="gofa-rapid-tasks-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 40px; max-height: 300px; overflow-y: auto;">
            Select a robot and click Fetch Tasks & Modules.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="RAPID Tasks">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-rapid-tasks">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads the controller's RAPID tasks and the modules loaded in one of them, via RWS.
    Useful for confirming what's actually loaded/running on the controller — e.g. after an
    upload, or when diagnosing why a socket command isn't responding.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span> <span class="property-type">optional</span></dt>
        <dd><code>{ task: 'T_ROB1' }</code> — overrides which task's modules to list.
        Any other payload (or none) triggers a read using the <em>Task</em> property.</dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
<pre>{
  ok: true,
  tasks: [
    { name: "T_ROB1", type: "normal", taskstate: "initiated",
      excstate: "started", active: "On", motiontask: "True" },
    { name: "SC_CBC", type: "semistatic", taskstate: "initiated", excstate: "started" },
    ...
  ],
  task: "T_ROB1",
  modules: [
    { name: "MainModule", type: "ProgMod" },
    { name: "BASE", type: "SysMod" },
    ...
  ]
}</pre>
        On failure: <code>{ ok: false, error: '...' }</code>
        </dd>
    </dl>

    <h3>Notes</h3>
    <p><code>tasks</code> lists every RAPID task on the controller (a GoFa 12 typically has more
    than just the one you write RAPID for — e.g. built-in tasks for the ASI status light or
    collision detection). <code>modules</code> lists what's loaded into the requested task:
    <code>ProgMod</code> is your program module (e.g. <b>MainModule.mod</b>), <code>SysMod</code>
    entries are system/installed modules.</p>
    <p>Both calls are plain reads — no mastership required, safe to poll.</p>
</script>
