<script type="text/javascript">
    RED.nodes.registerType('gofa-elog', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            domain: { value: '1' },
            count:  { value: 10, validate: RED.validators.number() }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || 'Event Log'; },
        paletteLabel: 'Event Log'
    });
</script>
<script type="text/html" data-template-name="gofa-elog">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-domain"><i class="fa fa-list"></i> Domain</label>
        <select id="node-input-domain">
            <option value="0">All domains</option>
            <option value="1">Controller (errors/warnings)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-count"><i class="fa fa-hashtag"></i> Entries</label>
        <input type="number" id="node-input-count" min="1" max="100" placeholder="10">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Event Log">
    </div>
</script>
<script type="text/html" data-help-name="gofa-elog">
    <p>Reads recent entries from the robot controller event log via RWS.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be an object to override config at runtime:</p>
    <ul>
        <li><code>domain</code> — <code>0</code> (all) or <code>1</code> (controller)</li>
        <li><code>count</code> — number of entries to return (max 100)</li>
    </ul>
    <h3>Output</h3>
    <pre>msg.payload = {
  ok: true,
  domain: 1,
  entries: [
    { seqnum, msgtype, code, title, tstamp },
    ...
  ]
}</pre>
    <p><code>msgtype</code>: <code>1</code>=info, <code>2</code>=warning, <code>3</code>=error.</p>
</script>
