<script type="text/javascript">
    RED.nodes.registerType('gofa-elog', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            domain:      { value: '1' },
            count:       { value: 10, validate: RED.validators.number() },
            minSeverity: { value: '1' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Event Log'; },
        paletteLabel: 'Event Log',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function fetchElogs() {
                var id = robotId();
                var dom = $('#node-input-domain').val() || '1';
                var sev = $('#node-input-minSeverity').val() || '1';
                var cnt = $('#node-input-count').val() || 10;
                if (!id) {
                    $('#gofa-elog-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                var btn = $('#gofa-elog-fetch').prop('disabled', true);
                $('#gofa-elog-result').html('<i class="fa fa-spinner fa-spin"></i> Fetching...');
                $.getJSON('gofa-elog/' + id + '/read', { domain: dom, minSeverity: sev, count: cnt })
                    .done(function(data) {
                        if (!data.entries || data.entries.length === 0) {
                            $('#gofa-elog-result').html('No matching elog entries.');
                            return;
                        }
                        var html = '<table class="red-ui-info-table" style="width: 100%; border-collapse: collapse;">' +
                            '<thead><tr>' +
                            '<th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc; width: 10%;">Seq</th>' +
                            '<th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc; width: 15%;">Severity</th>' +
                            '<th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc; width: 15%;">Code</th>' +
                            '<th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc;">Title</th>' +
                            '</tr></thead>' +
                            '<tbody>';
                        data.entries.forEach(function(e) {
                            var sevStr = 'Info';
                            var color = '#777';
                            if (e.msgtype === '2') {
                                sevStr = 'Warning';
                                color = '#f0ad4e';
                            } else if (e.msgtype === '3') {
                                sevStr = 'Error';
                                color = '#d9534f';
                            }
                            html += '<tr>' +
                                '<td style="padding: 4px; border-bottom: 1px solid #eee; font-family: monospace; font-size: 11px;">' + e.seqnum + '</td>' +
                                '<td style="padding: 4px; border-bottom: 1px solid #eee; font-weight: bold; color: ' + color + ';">' + sevStr + '</td>' +
                                '<td style="padding: 4px; border-bottom: 1px solid #eee; font-family: monospace; font-size: 11px;">' + e.code + '</td>' +
                                '<td style="padding: 4px; border-bottom: 1px solid #eee; font-size: 11px;" title="' + e.tstamp + '">' + e.title + '</td>' +
                                '</tr>';
                        });
                        html += '</tbody></table>';
                        $('#gofa-elog-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to fetch elogs';
                        $('#gofa-elog-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            $('#gofa-elog-fetch').on('click', function(e) {
                e.preventDefault();
                fetchElogs();
            });
            $('#node-input-domain, #node-input-minSeverity, #node-input-count').on('change input', function() {
                fetchElogs();
            });
            // Initial load
            fetchElogs();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-elog">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-domain"><i class="fa fa-list"></i> Domain</label>
        <select id="node-input-domain">
            <option value="0">Common</option>
            <option value="1">Operational</option>
            <option value="2">System</option>
            <option value="3">Hardware</option>
            <option value="4">Program</option>
            <option value="5">Motion</option>
            <option value="7">IO &amp; Communication</option>
            <option value="8">User</option>
            <option value="9">Safety</option>
            <option value="10">Internal</option>
            <option value="11">Process</option>
            <option value="12">Configuration</option>
            <option value="13">Paint</option>
            <option value="15">RAPID</option>
            <option value="17">ConnectedServices</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-minSeverity"><i class="fa fa-exclamation-triangle"></i> Min Severity</label>
        <select id="node-input-minSeverity">
            <option value="1">All (info+)</option>
            <option value="2">Warning+</option>
            <option value="3">Error only</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-count"><i class="fa fa-hashtag"></i> Entries</label>
        <input type="number" id="node-input-count" min="1" max="100" placeholder="10">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Live Elogs</label>
        <button id="gofa-elog-fetch" class="editor-button" style="width: auto;"><i class="fa fa-refresh"></i> Fetch Elogs</button>
    </div>
    <div class="form-row">
        <div id="gofa-elog-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 80px; max-height: 200px; overflow-y: auto;">
            Select a robot and click Fetch Elogs.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Event Log">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-elog">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads recent entries from the robot controller event log via RWS.</p>
    <p><b>Domain is a category, not a severity filter</b> — each entry belongs to exactly one domain (e.g. Safety, Motion, RAPID) regardless of whether it's info/warning/error. Use <b>Min Severity</b> to filter by severity instead; combine both if you want e.g. "errors only, from the Safety domain." The domain list above was confirmed live against this project's controller (<code>GET /rw/elog</code>) — a different controller/RobotWare configuration could expose a different set.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be an object to override config at runtime:</p>
    <ul>
        <li><code>domain</code> — domain number (see dropdown)</li>
        <li><code>count</code> — number of entries to return (max 100)</li>
        <li><code>minSeverity</code> — <code>1</code>=all, <code>2</code>=warning+, <code>3</code>=error only</li>
    </ul>
    <h3>Output</h3>
    <pre>msg.payload = {
  ok: true,
  domain: 1,
  entries: [
    { seqnum, msgtype, code, title, tstamp },
    ...
  ]
}</pre>
    <p><code>msgtype</code>: <code>1</code>=info, <code>2</code>=warning, <code>3</code>=error.</p>
    <p>On failure: <code>msg.payload = { ok: false, error: "..." }</code>.</p>
</script>
