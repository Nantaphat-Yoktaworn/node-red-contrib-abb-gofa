<script type="text/javascript">
    RED.nodes.registerType('gofa-rapid-var-read', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:     { value: '' },
            robot:    { value: '', type: 'gofa-robot', required: true },
            task:     { value: 'T_ROB1' },
            module:   { value: 'MainModule' },
            variable: { value: '' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || this.variable || 'RAPID Var Read'; },
        paletteLabel: 'RAPID Var Read',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function readVariable() {
                var id = robotId();
                var variable = $('#node-input-variable').val() || '';
                var task = $('#node-input-task').val() || 'T_ROB1';
                var module = $('#node-input-module').val() || 'MainModule';
                
                if (!id) {
                    $('#gofa-var-read-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                if (!variable) {
                    $('#gofa-var-read-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Enter a variable name first</span>');
                    return;
                }

                var btn = $('#gofa-var-read-btn').prop('disabled', true);
                $('#gofa-var-read-result').html('<i class="fa fa-spinner fa-spin"></i> Reading...');

                $.getJSON('gofa-rapid-var-read/' + id + '/read', { task: task, module: module, variable: variable })
                    .done(function(data) {
                        var sourceLabel = data.source === 'socket' ? '<span style="color: #5cb85c; font-weight: bold;">[Live Socket]</span>' : '<span style="color: #f0ad4e; font-weight: bold;">[Stale Module-Text]</span>';
                        var html = '<div>' + sourceLabel + ' <b>' + data.variable + ':</b> ' + data.value + '</div>';
                        if (data.stale) {
                            html += '<div style="font-size: 0.85em; color: #888; margin-top: 4px;"><i>Note: value is the compiled/declared value</i></div>';
                        }
                        $('#gofa-var-read-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to read variable';
                        $('#gofa-var-read-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-var-read-btn').on('click', function(e) {
                e.preventDefault();
                readVariable();
            });

            // Initial load
            readVariable();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-rapid-var-read">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-task"><i class="fa fa-tasks"></i> Task</label>
        <input type="text" id="node-input-task" placeholder="T_ROB1">
    </div>
    <div class="form-row">
        <label for="node-input-module"><i class="fa fa-file-code-o"></i> Module</label>
        <input type="text" id="node-input-module" placeholder="MainModule">
    </div>
    <div class="form-row">
        <label for="node-input-variable"><i class="fa fa-tag"></i> Variable</label>
        <input type="text" id="node-input-variable" placeholder="myVar">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Live Read</label>
        <button id="gofa-var-read-btn" class="editor-button" style="width: auto;"><i class="fa fa-refresh"></i> Read Variable</button>
    </div>
    <div class="form-row">
        <div id="gofa-var-read-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 40px; display: flex; flex-direction: column; justify-content: center;">
            Select a robot and click Read Variable.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="RAPID Var Read">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-rapid-var-read">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads the value of a RAPID variable from the robot controller.</p>
    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Task</dt><dd>RAPID task name (default: <code>T_ROB1</code>) — only used for the module-text fallback below</dd>
        <dt>Module</dt><dd>RAPID module name (default: <code>MainModule</code>) — only used for the module-text fallback below</dd>
        <dt>Variable</dt><dd>Variable name to read (e.g. <code>nTestVar</code>)</dd>
    </dl>
    <h3>Input</h3>
    <p><code>msg.payload</code> may be an object with <code>{ task, module, variable }</code>
    to override the configured values at runtime.</p>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload.ok <span class="property-type">boolean</span></dt>
        <dd><code>true</code> on success, <code>false</code> on error</dd>
        <dt>payload.variable <span class="property-type">string</span></dt>
        <dd>The variable name that was read</dd>
        <dt>payload.value <span class="property-type">number | string</span></dt>
        <dd>The variable's value</dd>
        <dt>payload.source <span class="property-type">string</span></dt>
        <dd><code>"socket"</code> (live) or <code>"module-text"</code> (stale — see Notes)</dd>
        <dt>payload.stale <span class="property-type">boolean</span></dt>
        <dd>Present and <code>true</code> only when <code>source</code> is <code>"module-text"</code></dd>
        <dt>payload.warning <span class="property-type">string</span></dt>
        <dd>Present alongside <code>stale</code>, explains why the value may not be current</dd>
    </dl>
    <h3>Notes</h3>
    <p><b>Primary path — live and accurate:</b> the socket <code>GETVAR:&lt;name&gt;</code>
    command. Only works for variables explicitly added to <code>TryGetVar</code> in
    <code>MainModule.mod</code> (built-in: <code>nTestVar</code>, <code>sTestMsg</code>). This
    is what runs when <code>source</code> is <code>"socket"</code> — no caveats, trust it.</p>
    <p><b>Fallback path — works for any variable, but stale:</b> if the variable isn't in the
    GETVAR allow-list, this node reads the module's source text off the controller filesystem
    and regex-matches <code>name := value</code>. <b>Confirmed live against a real OmniCore
    controller that this returns the compiled/declared value, not the variable's current
    runtime value</b> — writing a new value and re-reading here still shows the old one. There
    is currently no working RWS path to a live value for variables outside the GETVAR
    allow-list (RWS's generic symbol endpoint 404s on OmniCore — see the <code>abb-rws</code>
    skill), so this fallback is offered for convenience but always marked
    <code>stale: true</code> rather than presented with false confidence. For a live read, add
    the variable to <code>TryGetVar</code> instead.</p>
</script>
