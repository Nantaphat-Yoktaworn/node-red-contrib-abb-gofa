<script type="text/html" data-help-name="gofa-egm">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Streams joint positions to/from the robot over EGM (Externally Guided Motion) — a
    UDP/protobuf channel capable of sub-10ms closed-loop motion, unlike the TCP socket
    protocol or RWS (which tops out around 500ms).</p>

    <p><b>Requires <code>MainModuleEGM.mod</code>, not the default <code>MainModule.mod</code>,
    to be loaded on the controller.</b> The default module has no EGM support. If
    <code>MainModule.mod</code> is currently loaded, first: <code>gofa-rapid-exec</code>
    (<code>stop</code>) → <code>gofa-rapid-exec</code> (<code>unloadmod</code>, module
    <code>MainModule</code> — this only detaches it from the task, the file stays on disk) →
    <code>gofa-file</code> upload (<code>rapid/MainModuleEGM.mod</code>) →
    <code>gofa-rapid-exec</code> (<code>loadmod</code> → <code>resetpp</code> →
    <code>start</code>). Skipping the unload step leaves <em>both</em> modules loaded — RAPID
    rejects <code>resetpp</code>/<code>start</code> with "Global routine name main ambiguous"
    (confirmed live) since both declare <code>PROC main()</code>. If the wrong module ends up
    loaded anyway, <code>start</code> on this node fails with a "wrong module loaded" error
    instead of hanging.</p>

    <p>While a session is active, the robot's TCP socket server is stopped — every other
    socket-based node (<code>gofa-jog</code>, <code>gofa-go-point</code>, etc.) will fail to
    connect until the session ends. <b>Ending a session requires the <code>"stop"</code> action
    (or closing/redeploying this node) — it is not automatic</b> (EGM's own comm-timeout
    mechanism does not reliably end a session once connected; going quiet on its own can leave
    the controller blocked for minutes with no recovery). <code>"stop"</code> sets a dedicated
    signal via RWS that a RAPID interrupt (TRAP) watches — the controller ends the session
    <em>gracefully</em> (<code>EGMStop</code>) and returns to TCP serving on its own; the RAPID
    task itself never actually stops, so this is fast (~1s) and doesn't leak controller-side EGM
    resources.</p>

    <p>One-time controller setup (not done by this node): a UDPUC transmission protocol named
    <code>EGM_PC</code> (RobotStudio &gt; Controller &gt; Configuration &gt; Communication &gt;
    Transmission Protocol; Remote Address = the Node-RED host's current IP — this drifts the
    same way the robot's own IP does, and a stale address here looks identical to a firewall
    problem: <code>start</code> succeeds but no EGM frames ever arrive — requires a controller
    restart after changing), and — on the machine running Node-RED — a firewall rule allowing
    inbound UDP on the configured port.</p>

    <p><b>Caution — tool load data:</b> per ABB's EGM Application Manual, the robot should have
    correct tool load data (<code>LoadIdentify</code>) before starting EGM; incorrect load data
    can cause servo torque overruns or safety halts when EGM issues fast corrections. Confirm
    <code>tGripper</code> in <code>MainModuleEGM.mod</code> reflects your actual end-of-arm
    tooling (or run <code>LoadIdentify</code>) before relying on EGM with real tooling
    attached.</p>

    <p><b>If RAPID is ever stopped some other way</b> while a session is active (FlexPendant
    Stop, e-stop, module switching — normal <code>"start"</code>/<code>"stop"</code> use of this
    node no longer stops the task at all) <b>always <code>resetpp</code> before the next plain
    RAPID <code>start</code></b>. Resuming with a bare "continue" start (program pointer
    wherever it was left) can resume execution inside the EGM code block itself, skipping
    <code>RunEgmJoint</code>'s own <code>EGMReset</code> and throwing "You have to disconnect an
    EGM instance using EGMReset before you can connect another". If the same error still happens
    after a genuinely fresh <code>resetpp</code> + <code>start</code>, the problem has moved to
    a stuck EGM resource at the controller level — a full controller restart is the only fix.</p>

    <p>If <code>robot.backgroundPort</code>'s <code>BackgroundLed.mod</code> task is set up (see
    <code>CLAUDE.md</code>'s "Background LED task" section), this node sets the ASI status LED
    to a distinct color (magenta) while a session is streaming and resets it to green on
    <code>stop</code> — best-effort only, a LED write failure never blocks/fails start or stop.</p>

    <p><b>This node only controls the EGM session itself (start/stop) and emits telemetry.</b>
    To send a movement target once a session is active, use the separate
    <code>gofa-egm-move</code> node — it checks whether this node's session is active and routes
    to a fallback output (e.g. a normal <code>gofa-movej</code> TCP move) if not.</p>

    <h3>Configuration</h3>
    <ul>
        <li><b>Action</b> — <code>Start EGM</code> or <code>Stop EGM</code>, the action this node
        instance runs by default on a bare inject. Same pattern as <code>gofa-motor</code>/
        <code>gofa-rapid-exec</code>: put one node instance per action in a flow (e.g. a "Start
        EGM" node and a separate "Stop EGM" node), each fed by its own inject.</li>
        <li><b>UDP Port</b> — local port to listen on for EGM frames (must match the UDPUC
        config's Remote Port; default <code>6510</code>)</li>
        <li><b>Output throttle</b> — minimum ms between feedback messages; EGM frames arrive
        far faster (~24ms) than most flows need to see</li>
    </ul>

    <h3>Input</h3>
    <p><code>msg.payload</code> overrides the configured Action, same as other action-style nodes
    in this palette — a bare <code>"start"</code>/<code>"stop"</code> string, or
    <code>{ action: "start" }</code> / <code>{ action: "stop" }</code>. If <code>msg.payload</code>
    doesn't resolve to either, the node's configured Action runs (so a plain inject with an empty/
    date payload just fires whichever action this instance is set to).</p>

    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, joints: [...], seqno, mciState, motorsOn, convergence,
    source: 'egm' }</code>, emitted at most once per throttle interval while streaming.</p>
</script>
