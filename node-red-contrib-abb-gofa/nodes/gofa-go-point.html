<script type="text/javascript">
    RED.nodes.registerType('gofa-go-point', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:      { value: '' },
            robot:     { value: '', type: 'gofa-robot', required: true },
            pointName: { value: '' },
            moveType:  { value: 'J' },
            storage:   { value: 'local' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || ('Go to ' + (this.pointName || '...')); },
        paletteLabel: 'Go to Point',
        oneditprepare: function() {
            var node = this;
            function endpoint(robotId) {
                var storage = $('#node-input-storage').val();
                return '/gofa-robot/' + robotId + '/' + (storage === 'remote' ? 'remote-points' : 'points');
            }
            function loadPoints(robotId) {
                var sel = $('#node-input-pointName').empty()
                    .append($('<option value="">-- select point --</option>'));
                if (!robotId) return;
                $.getJSON(endpoint(robotId), function(pts) {
                    pts.forEach(function(p) {
                        sel.append($('<option>').val(p.name).text(p.name));
                    });
                    sel.val(node.pointName);
                });
            }
            loadPoints(node.robot);
            $('#node-input-robot').change(function() { loadPoints($(this).val()); });
            $('#node-input-storage').change(function() { loadPoints($('#node-input-robot').val()); });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-go-point">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-storage"><i class="fa fa-database"></i> Storage</label>
        <select id="node-input-storage">
            <option value="local">Local (points.json)</option>
            <option value="remote">On-Robot</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-pointName"><i class="fa fa-map-marker"></i> Point</label>
        <select id="node-input-pointName" style="width:70%"></select>
    </div>
    <div class="form-row">
        <label for="node-input-moveType"><i class="fa fa-share"></i> Move type</label>
        <select id="node-input-moveType" style="width:150px">
            <option value="J">Joint (MoveJ)</option>
            <option value="L">Linear (MoveL)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Go to Point">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-go-point">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Moves the robot to a saved point by name or ID.</p>
    <h3>Input</h3>
    <p><code>msg.payload.name</code> or <code>msg.payload.id</code> overrides the configured
    point; <code>msg.payload.storage</code> (<code>"local"</code>/<code>"remote"</code>)
    overrides <em>Storage</em>; <code>msg.payload.moveType</code> (<code>"J"</code>/<code>"L"</code>)
    overrides <em>Move type</em> — see below.</p>
    <h3>Output</h3>
    <ul>
        <li>Success: <code>msg.payload = { ok: true, ack: "OK:...", point: {...}, moveType: "J"|"L" }</code></li>
        <li>Point not found, invalid point data, or any other failure: <code>msg.payload = { ok: false, error: "..." }</code></li>
    </ul>
    <h3>Storage</h3>
    <p><b>Local</b> — looks the point up in the config node's Points File (default). <b>On-Robot</b> —
    fetches the point from a JSON file on the robot controller's own disk via RWS
    <code>fileservice</code>, then moves exactly the same way (the socket <code>GOTOJ</code>/
    <code>GOTOL</code> command is unaffected either way).</p>
    <h3>Move type</h3>
    <p><b>Joint (MoveJ)</b> — joint-interpolated. Each axis moves independently so the path can curve; more predictable/reliable since it won't fault or slow drastically near a singularity. This is the default whenever move type is left unset or an invalid value is passed.</p>
    <p><b>Linear (MoveL)</b> — straight-line TCP path to the target. Useful for controlled approach/retract moves, but can hit singularities or joint limits along the line that a joint move to the same target would route around.</p>
    <p><code>msg.payload.moveType</code> (<code>"J"</code> or <code>"L"</code>) overrides the configured value per message; anything other than exactly <code>"L"</code> falls back to Joint (MoveJ).</p>
</script>
