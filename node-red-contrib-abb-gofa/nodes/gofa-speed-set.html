<script type="text/javascript">
    RED.nodes.registerType('gofa-speed-set', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true },
            speed: { value: 50, validate: RED.validators.number() }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || ('Speed ' + this.speed + '%'); },
        paletteLabel: 'Speed Set'
    });
</script>
<script type="text/html" data-template-name="gofa-speed-set">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-speed"><i class="fa fa-tachometer"></i> Speed %</label>
        <input type="number" id="node-input-speed" min="1" max="100" placeholder="50">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Speed 50%">
    </div>
</script>
<script type="text/html" data-help-name="gofa-speed-set">
    <p>Sets the robot speed override percentage (1–100) via the RAPID socket server (TCP port
    1025, RAPID's <code>SpeedRefresh</code> instruction — no mastership needed).</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A number, or a non-empty string parseable as a number — used directly as the speed percentage</li>
        <li><code>null</code> / not set / any other type (including an object) — uses the configured default</li>
    </ul>
    <p>Values outside 1–100 are clamped with a warning.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, speed: 75 }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
    <h3>Notes</h3>
    <p>This sets the global speed override on the controller, the same as the
    speed slider on the FlexPendant — RAPID must be running for this node to work.</p>
</script>
