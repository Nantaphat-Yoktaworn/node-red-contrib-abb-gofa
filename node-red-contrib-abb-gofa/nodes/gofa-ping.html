<script type="text/javascript">
    RED.nodes.registerType('gofa-ping', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Ping'; },
        paletteLabel: 'Ping',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function runPing() {
                var id = robotId();
                if (!id) {
                    $('#gofa-ping-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                var btn = $('#gofa-ping-action').prop('disabled', true);
                $('#gofa-ping-result').html('<i class="fa fa-spinner fa-spin"></i> Pinging...');
                $.getJSON('gofa-ping/' + id + '/read')
                    .done(function(data) {
                        var html = '<span><i class="fa fa-check-circle" style="color: #5cb85c;"></i> Pong! Latency: <b>' + data.rtt + ' ms</b></span>';
                        $('#gofa-ping-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to ping';
                        $('#gofa-ping-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            $('#gofa-ping-action').on('click', function(e) {
                e.preventDefault();
                runPing();
            });
            // Initial load
            runPing();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-ping">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Latency Test</label>
        <button id="gofa-ping-action" class="editor-button" style="width: auto;"><i class="fa fa-refresh"></i> Ping Robot</button>
    </div>
    <div class="form-row">
        <div id="gofa-ping-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 40px; display: flex; align-items: center;">
            Select a robot and click Ping Robot.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Ping">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-ping">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Sends a <code>PING</code> command to the robot and measures the round-trip time.</p>
    <h3>Input</h3>
    <p>Any message triggers the ping. <code>msg.payload</code> is ignored.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, rtt: 12 }</code> on success, where <code>rtt</code> is the round-trip time in milliseconds.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
