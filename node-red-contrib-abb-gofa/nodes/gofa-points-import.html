<script type="text/javascript">
    RED.nodes.registerType('gofa-points-import', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:     { value: '' },
            robot:    { value: '', type: 'gofa-robot', required: true },
            loadPath: { value: '' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Points Import'; },
        paletteLabel: 'Points Import'
    });
</script>
<script type="text/html" data-template-name="gofa-points-import">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Points Import">
    </div>
    <div class="form-row">
        <label for="node-input-loadPath"><i class="fa fa-folder-open"></i> Load from file</label>
        <input type="text" id="node-input-loadPath" placeholder="Leave blank to use msg.payload (blank payload = clear all points)">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-points-import">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Imports a points list into the robot config node, <b>replacing</b> the entire existing list.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object | array</span></dt>
        <dd>
            <ul>
                <li><b>string</b> — file path to load from, e.g. <code>'/data/points_backup.json'</code></li>
                <li><b>object</b> — <code>{ loadPath: '/data/points_backup.json' }</code></li>
                <li><b>array</b> — point objects to import directly, e.g. <code>[{ id, name, target }]</code></li>
                <li><b>{ points }</b> — <code>{ points: [...] }</code></li>
                <li><b>(absent)</b> — uses the <em>Load from file</em> property; if also empty, clears all points</li>
            </ul>
            Legacy: <code>msg.loadPath</code> (string) is still accepted as a fallback.
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload.ok <span class="property-type">boolean</span></dt>
        <dd><code>true</code> on success.</dd>
        <dt>payload.count <span class="property-type">number</span></dt>
        <dd>Number of points imported (0 = all points cleared).</dd>
        <dt>payload.loadedFrom <span class="property-type">string | null</span></dt>
        <dd>File path that was read, or <code>null</code> if loaded from <code>msg.payload</code> directly.</dd>
    </dl>

    <h3>Notes</h3>
    <p>This overwrites all existing saved points. Export first with <b>gofa-points-export</b> if you need a backup.</p>
</script>
