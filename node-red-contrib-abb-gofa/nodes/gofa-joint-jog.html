<script type="text/javascript">
    RED.nodes.registerType('gofa-joint-jog', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true },
            joint: { value: 'J1' },
            dir:   { value: '+' },
            step:  { value: 5 }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || ('Joint Jog ' + this.joint + this.dir + this.step + 'deg'); },
        paletteLabel: 'Joint Jog',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function performJointJog() {
                var id = robotId();
                var joint = $('#node-input-joint').val() || 'J1';
                var dir = $('#node-input-dir').val() || '+';
                var step = $('#node-input-step').val() || '5';

                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                if (!confirm('WARNING: The robot will execute a physical relative joint jog movement of ' + joint + dir + step + ' degrees. Ensure the path is clear. Proceed?')) {
                    return;
                }

                var btn = $('#gofa-joint-jog-btn').prop('disabled', true);
                RED.notify('Jogging joint...', 'info');

                $.ajax({
                    url: 'gofa-joint-jog/' + id + '/jog',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ joint: joint, dir: dir, step: step })
                })
                    .done(function(data) {
                        RED.notify('Joint jog command acknowledged successfully: ' + data.ack, 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Joint jog command failed';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-joint-jog-btn').on('click', function(e) {
                e.preventDefault();
                performJointJog();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-joint-jog">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-joint"><i class="fa fa-cog"></i> Joint</label>
        <select id="node-input-joint">
            <option value="J1">J1</option><option value="J2">J2</option>
            <option value="J3">J3</option><option value="J4">J4</option>
            <option value="J5">J5</option><option value="J6">J6</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-dir"><i class="fa fa-exchange"></i> Direction</label>
        <select id="node-input-dir">
            <option value="+">+ (positive)</option>
            <option value="-">- (negative)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-step"><i class="fa fa-sliders"></i> Step (deg)</label>
        <input type="number" id="node-input-step" placeholder="5" min="1" max="30">
    </div>
    <div class="form-row">
        <button id="gofa-joint-jog-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-cog"></i> Jog Joint Now</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Joint Jog J1+5">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-joint-jog">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Moves a single robot joint by a relative angle.</p>
    <h3>Input</h3>
    <p><code>msg.payload.joint</code>, <code>msg.payload.dir</code>, <code>msg.payload.step</code>
    override the configured values. Each is validated and the message is rejected (no socket
    command sent) if invalid:</p>
    <ul>
        <li><code>joint</code> — <code>"J1"</code>–<code>"J6"</code> (or a bare <code>1</code>–<code>6</code>)</li>
        <li><code>dir</code> — must be exactly <code>"+"</code> or <code>"-"</code></li>
        <li><code>step</code> — a number in degrees; clamped to 1–30</li>
    </ul>
    <h3>Output</h3>
    <p>Success: <code>msg.payload = { ok: true, ack: "OK:...", token: "J1+5" }</code></p>
    <p>Invalid input (bad joint/direction/step) or a connection-level failure:
    <code>msg.payload = { ok: false, error: "..." }</code>. A rejected socket command (robot
    replied but not with <code>OK:</code>) instead gives <code>{ ok: false, ack: "...",
    token: "..." }</code> — <code>ok</code> is <code>false</code> and <code>ack</code> holds the
    raw rejection, with no <code>error</code> field.</p>
</script>
