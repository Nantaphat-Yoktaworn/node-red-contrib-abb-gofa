<script type="text/javascript">
    RED.nodes.registerType('gofa-stop-seq', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false }, name: { value: '' }, robot: { value: '', type: 'gofa-robot', required: true } },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Stop Sequence'; },
        paletteLabel: 'Stop Sequence',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }

            function stopSequence() {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                var btn = $('#gofa-stop-seq-btn').prop('disabled', true);
                RED.notify('Halting sequence...', 'info');

                $.ajax({
                    url: 'gofa-stop-seq/' + id + '/stop',
                    type: 'POST',
                    contentType: 'application/json'
                })
                    .done(function(data) {
                        RED.notify('Sequence stop requested successfully', 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to stop sequence';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-stop-seq-btn').on('click', function(e) {
                e.preventDefault();
                stopSequence();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-stop-seq">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <button id="gofa-stop-seq-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-stop"></i> Stop Sequence Now</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Stop Sequence">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-stop-seq">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Immediately halts the running <b>gofa-sequencer</b>: sets a stop flag (checked before the
    next step) <em>and</em> sends an immediate <code>stop</code> over the TCP socket to abort
    any in-progress move right away, rather than waiting for the current move + dwell to finish.</p>
    <p>Must reference the same Robot config node as the running Sequencer.</p>
    <h3>Input</h3>
    <p>Any message triggers the action. <code>msg.payload</code> is ignored.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, message: 'stop requested' }</code> on success,
    <code>{ ok: false, error: "..." }</code> if no Robot is configured.</p>
</script>
