<script type="text/javascript">
    RED.nodes.registerType('gofa-point-list', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:    { value: '' },
            robot:   { value: '', type: 'gofa-robot', required: true },
            storage: { value: 'local' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Point List'; },
        paletteLabel: 'Point List'
    });
</script>
<script type="text/html" data-template-name="gofa-point-list">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-storage"><i class="fa fa-database"></i> Storage</label>
        <select id="node-input-storage">
            <option value="local">Local (points.json)</option>
            <option value="remote">On-Robot</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Point List">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-point-list">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Outputs the current list of all saved points.</p>
    <h3>Input</h3>
    <p>Any message triggers a read. <code>msg.payload.storage</code>
    (<code>"local"</code>/<code>"remote"</code>) overrides <em>Storage</em>.</p>
    <h3>Output</h3>
    <ul>
        <li>Success: <code>msg.payload</code> = array of <code>{ id, name, target }</code> (the full saved-point list, may be empty)</li>
        <li>Failure: <code>msg.payload = { ok: false, error: "..." }</code></li>
    </ul>
</script>
