<script type="text/javascript">
    RED.nodes.registerType('gofa-movej', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:     { value: '' },
            robot:    { value: '', type: 'gofa-robot', required: true },
            joints:   { value: '[0,0,85,0,0,0]' },
            moveType: { value: 'J' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || (this.moveType === 'L' ? 'Move Joints (Linear)' : 'Move Joints'); },
        paletteLabel: 'Move Joints'
    });
</script>
<script type="text/html" data-template-name="gofa-movej">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-joints"><i class="fa fa-sliders"></i> Joints</label>
        <input type="text" id="node-input-joints" placeholder="[0,0,85,0,0,0]" style="width:70%">
    </div>
    <div class="form-row">
        <label style="width:auto; padding-left:105px; color:#aaa; font-size:0.85em">
            JSON array [j1,j2,j3,j4,j5,j6] in degrees
        </label>
    </div>
    <div class="form-row">
        <label for="node-input-moveType"><i class="fa fa-arrows"></i> Move type</label>
        <select id="node-input-moveType">
            <option value="J">Joint (MoveJ) — default, most reliable</option>
            <option value="L">Linear (MoveL) — straight-line TCP path</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Move Joints">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-movej">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Moves the robot to an absolute joint position via the RAPID socket server
    (<code>movej</code>/<code>movel</code> commands).</p>
    <h3>Move type</h3>
    <ul>
        <li><b>Joint (MoveJ)</b> — joint-interpolated (RAPID <code>MoveAbsJ</code>): each axis
        moves directly to its target angle. The default and most reliable choice — it cannot
        hit a path singularity.</li>
        <li><b>Linear (MoveL)</b> — the RAPID server computes the pose those joint angles
        describe (forward kinematics via <code>CalcRobT</code>) and moves the TCP there in a
        straight line (<code>MoveL</code>). Useful for a controlled approach, but the straight
        line can pass through a singularity or joint limit that Joint mode would route around.</li>
    </ul>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A 6-element array <code>[j1,j2,j3,j4,j5,j6]</code> of joint angles in degrees</li>
        <li>An object <code>{ j1, j2, j3, j4, j5, j6 }</code>, optionally with
        <code>moveType: "J"</code> or <code>"L"</code></li>
        <li><code>null</code> / not set — uses the configured default</li>
    </ul>
    <p><code>msg.moveType</code> (<code>"J"</code>/<code>"L"</code>) also overrides the
    configured Move type; anything other than exactly <code>"L"</code> resolves to Joint.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, joints: [j1..j6], moveType: "J"|"L" }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
