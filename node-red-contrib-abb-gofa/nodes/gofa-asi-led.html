<script type="text/javascript">
    RED.nodes.registerType('gofa-asi-led', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:       { value: '' },
            robot:      { value: '', type: 'gofa-robot', required: true },
            red:        { value: 0 },
            grn:        { value: 0 },
            blu:        { value: 0 },
            period:     { value: 0 },
            blinkCount: { value: 0 },
            blinkMs:    { value: 250 },
            transport:  { value: 'socket' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'ASI LED'; },
        paletteLabel: 'ASI LED',
        oneditprepare: function() {
            var PRESETS = {
                custom:  null,
                off:     [0,   0,   0  ],
                red:     [255, 0,   0  ],
                green:   [0,   255, 0  ],
                blue:    [0,   0,   255],
                yellow:  [255, 255, 0  ],
                cyan:    [0,   255, 255],
                magenta: [255, 0,   255],
                white:   [255, 255, 255],
                orange:  [255, 128, 0  ]
            };

            var sel = $('#led-preset');
            Object.keys(PRESETS).forEach(function(name) {
                sel.append($('<option>').val(name).text(name.charAt(0).toUpperCase() + name.slice(1)));
            });

            sel.on('change', function() {
                var p = PRESETS[$(this).val()];
                if (p) {
                    $('#node-input-red').val(p[0]);
                    $('#node-input-grn').val(p[1]);
                    $('#node-input-blu').val(p[2]);
                    updateSwatch();
                }
            });

            function updateSwatch() {
                var r = parseInt($('#node-input-red').val()) || 0;
                var g = parseInt($('#node-input-grn').val()) || 0;
                var b = parseInt($('#node-input-blu').val()) || 0;
                $('#led-swatch').css('background', 'rgb(' + r + ',' + g + ',' + b + ')');
            }

            function toggleBlinkMs() {
                var count = parseInt($('#node-input-blinkCount').val()) || 0;
                $('#blink-ms-row').toggle(count > 0);
            }

            $('#node-input-red, #node-input-grn, #node-input-blu').on('input', updateSwatch);
            $('#node-input-blinkCount').on('input', toggleBlinkMs);

            setTimeout(function() {
                updateSwatch();
                toggleBlinkMs();
            }, 0);

            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }

            function setLedColor(isReset) {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                var btn = isReset ? $('#gofa-led-reset') : $('#gofa-led-set');
                btn.prop('disabled', true);

                var data = { transport: $('#node-input-transport').val() || 'socket' };
                if (isReset) {
                    data.payload = 'reset';
                } else {
                    data.red = $('#node-input-red').val() || 0;
                    data.green = $('#node-input-grn').val() || 0;
                    data.blue = $('#node-input-blu').val() || 0;
                    data.period = $('#node-input-period').val() || 0;
                    data.blinkCount = $('#node-input-blinkCount').val() || 0;
                    data.blinkMs = $('#node-input-blinkMs').val() || 250;
                }

                $.ajax({
                    url: 'gofa-asi-led/' + id + '/set',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data)
                })
                    .done(function() {
                        RED.notify(isReset ? 'LED successfully reset' : 'LED color set successfully', 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to update LED';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-led-set').on('click', function(e) {
                e.preventDefault();
                setLedColor(false);
            });
            $('#gofa-led-reset').on('click', function(e) {
                e.preventDefault();
                setLedColor(true);
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-asi-led">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label><i class="fa fa-paint-brush"></i> Preset</label>
        <select id="led-preset" style="width:140px"></select>
        <span id="led-swatch" style="display:inline-block;width:24px;height:24px;border-radius:4px;border:1px solid #555;margin-left:8px;vertical-align:middle"></span>
    </div>
    <div class="form-row">
        <label for="node-input-red"><i class="fa fa-circle" style="color:#e55"></i> Red (0–255)</label>
        <input type="text" inputmode="numeric" id="node-input-red" placeholder="0" style="width:80px">
    </div>
    <div class="form-row">
        <label for="node-input-grn"><i class="fa fa-circle" style="color:#5c5"></i> Green (0–255)</label>
        <input type="text" inputmode="numeric" id="node-input-grn" placeholder="0" style="width:80px">
    </div>
    <div class="form-row">
        <label for="node-input-blu"><i class="fa fa-circle" style="color:#55e"></i> Blue (0–255)</label>
        <input type="text" inputmode="numeric" id="node-input-blu" placeholder="0" style="width:80px">
    </div>
    <div class="form-row">
        <label for="node-input-period"><i class="fa fa-flash"></i> Blink period</label>
        <input type="text" inputmode="numeric" id="node-input-period" placeholder="0" style="width:80px">
        <span style="color:#888;font-size:0.85em;margin-left:6px">0 = solid (hardware signal)</span>
    </div>
    <div class="form-row">
        <label for="node-input-blinkCount"><i class="fa fa-repeat"></i> Blink count</label>
        <input type="text" inputmode="numeric" id="node-input-blinkCount" placeholder="0" style="width:80px">
        <span style="color:#888;font-size:0.85em;margin-left:6px">0 = use period signal above</span>
    </div>
    <div class="form-row" id="blink-ms-row" style="display:none">
        <label for="node-input-blinkMs"><i class="fa fa-clock-o"></i> Flash time (ms)</label>
        <input type="text" inputmode="numeric" id="node-input-blinkMs" placeholder="250" style="width:80px">
        <span style="color:#888;font-size:0.85em;margin-left:6px">on + off duration per flash</span>
    </div>
    <div class="form-row">
        <label for="node-input-transport"><i class="fa fa-exchange"></i> Transport</label>
        <select id="node-input-transport">
            <option value="socket">Socket (requires RAPID/T_ROB1 running)</option>
            <option value="rws">RWS (requires Access Level: All on the ASI signals)</option>
            <option value="background">Background task (works while T_ROB1 is stopped — see BackgroundLed.mod)</option>
        </select>
    </div>
    <div class="form-row" style="display: flex; gap: 5px;">
        <button id="gofa-led-set" class="editor-button" style="flex-grow: 1;"><i class="fa fa-lightbulb-o"></i> Set LED Color</button>
        <button id="gofa-led-reset" class="editor-button" style="flex-grow: 1;"><i class="fa fa-refresh"></i> Reset to Green</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="ASI LED">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-asi-led">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Controls an ASI RGB LED on the ABB GoFa controller, via any of three transports:</p>
    <ul>
        <li><b>Socket</b> (default) — RAPID's <code>SETLED</code>/<code>RESETLED</code> over <code>MainModule.mod</code>'s TCP socket server (port 1025, T_ROB1). Needs T_ROB1 actually running — the socket server is part of that task's own main loop, so it's dead whenever T_ROB1 is stopped (e.g. mid hand-guiding/teach workflow).</li>
        <li><b>RWS</b> — writes the underlying <code>Asi1LedRed</code>/<code>Asi1LedGreen</code>/<code>Asi1LedBlue</code>/<code>Asi1LedPeriod</code> GO signals directly via <code>POST /rw/iosystem/signals/{name}/set-value</code>, same as <code>gofa-do-write</code>'s RWS transport. Requires each signal's <code>Access Level</code> to be set to <code>All</code> in RobotStudio. On many controllers the ASI board (the robot's built-in collaborative status light) does not expose an editable Access Level at all — if that's the case here, this transport will always fail and you want <b>Background task</b> instead.</li>
        <li><b>Background task</b> — talks to <code>BackgroundLed.mod</code> running in its own RAPID task (not T_ROB1) on <code>robot.backgroundPort</code> (default 1026). Keeps working while T_ROB1 is stopped, since it isn't part of T_ROB1's Program Stop/Start. Requires a one-time RobotStudio task setup (RobotWare Multitasking option) — see <code>CLAUDE.md</code>'s "Background LED task" section.</li>
    </ul>
    <h3>Blink count</h3>
    <p>When <em>Blink count</em> = 0 (default): sends a single <code>SETLED</code> command using the hardware <code>Asi1LedPeriod</code> signal for continuous blinking.</p>
    <p>When <em>Blink count</em> &gt; 0: Node-RED software-controls N on/off cycles (ignores period signal). <em>Flash time</em> sets how long the LED stays on and off per flash (default 250 ms each).</p>
    <h3>msg.payload overrides</h3>
    <ul>
        <li><code>'red'</code> / <code>'green'</code> / <code>'blue'</code> / <code>'yellow'</code> / <code>'white'</code> / <code>'off'</code> etc. — named colour preset</li>
        <li><code>false</code> or <code>0</code> — turn off</li>
        <li><code>{ r, g, b, period, blinkCount, blinkMs }</code> — full override</li>
        <li><code>{ color: 'red', blinkCount: 3, blinkMs: 200 }</code> — preset + counted blink</li>
        <li><code>'reset'</code> or <code>{ action: 'reset' }</code> — restore normal LED (static green)</li>
        <li><code>{ transport: 'rws' }</code> / <code>{ transport: 'background' }</code> (combine with any of the above) — override the configured transport for this message</li>
        <li><code>null</code> / not set — uses node editor values</li>
    </ul>
    <h3>Output</h3>
    <ul>
        <li>Single/continuous <code>SETLED</code>: <code>msg.payload = { ok: true, r, g, b, period }</code></li>
        <li>Counted blink (<em>Blink count</em> &gt; 0): <code>msg.payload = { ok: true, r, g, b, blinks }</code>, sent once the full sequence finishes</li>
        <li><code>'reset'</code>: <code>msg.payload = { ok: true, reset: true }</code></li>
        <li>Failure (any case): <code>msg.payload = { ok: false, error: "..." }</code></li>
    </ul>
</script>
