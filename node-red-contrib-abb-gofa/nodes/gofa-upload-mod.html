<script type="text/javascript">
    RED.nodes.registerType('gofa-upload-mod', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:       { value: '' },
            robot:      { value: '', type: 'gofa-robot', required: true },
            localPath:  { value: '' },
            remotePath: { value: '$HOME/Programs/MainModule.mod' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Upload .mod'; },
        paletteLabel: 'Upload .mod'
    });
</script>
<script type="text/html" data-template-name="gofa-upload-mod">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-localPath"><i class="fa fa-file-code-o"></i> Local path (PC)</label>
        <input type="text" id="node-input-localPath" placeholder="/path/to/rapid/MainModule.mod">
    </div>
    <div class="form-row">
        <label for="node-input-remotePath"><i class="fa fa-folder"></i> Remote path</label>
        <input type="text" id="node-input-remotePath" placeholder="$HOME/Programs/MainModule.mod">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Upload .mod">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-upload-mod">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Uploads a RAPID <code>.mod</code> file to the robot controller via RWS fileservice (HTTP PUT).</p>
    <h3>Input</h3>
    <p>Send any message to trigger the upload. The <b>Local path (PC)</b> and <b>Remote path</b> configured in the node are used by default.</p>
    <p><code>msg.payload</code> can override at runtime:</p>
    <ul>
        <li><b>String</b> — treated as a local file path, overrides configured local path.</li>
        <li><b>Buffer</b> — uploaded as-is (skips disk read).</li>
        <li><b>Object</b> <code>{ localPath, remotePath }</code> — overrides either or both paths.</li>
    </ul>
    <h3>SERVER_IP injection</h3>
    <p>Always rewrites <code>CONST string SERVER_IP := "...";</code> in the uploaded content to the robot config node's IP before it's sent, so <code>MainModule.mod</code>'s socket-bind address can never drift out of sync with what Node-RED actually connects to. If the file doesn't contain that constant, this is a no-op — safe for uploading any other file with this node.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, remotePath: "$HOME/Programs/MainModule.mod", bytes: 1234, serverIpInjected: true }</code></p>
    <h3>After upload</h3>
    <p>On the FlexPendant: Program Editor → Load → the uploaded file, then PP to Main → Play.</p>
</script>
