<script type="text/javascript">
    RED.nodes.registerType('gofa-do-write', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            signal: { value: 'DO10_1' },
            value:  { value: 1, validate: RED.validators.number() }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || ('DO ' + this.signal); },
        paletteLabel: 'DO Write'
    });
</script>
<script type="text/html" data-template-name="gofa-do-write">
    <div class="form-row" style="background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:8px;margin-bottom:8px;">
        <i class="fa fa-exclamation-triangle" style="color:#856404;"></i>
        <span style="color:#856404;font-weight:bold;"> Requires external I/O module</span><br>
        <span style="color:#856404;font-size:0.9em;">Signal will not exist (HTTP 404) unless a digital I/O expansion module is fitted to the controller.</span>
    </div>
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-signal"><i class="fa fa-bolt"></i> Signal</label>
        <input type="text" id="node-input-signal" placeholder="DO10_1">
    </div>
    <div class="form-row">
        <label for="node-input-value"><i class="fa fa-toggle-on"></i> Value</label>
        <input type="number" id="node-input-value" min="0" max="1" placeholder="1">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
</script>
<script type="text/html" data-help-name="gofa-do-write">
    <p><b>⚠ Requires external I/O module.</b> Digital output signals (DO) do not exist on the base OmniCore C30 — an expansion I/O module must be fitted and configured. Without it, this node returns HTTP 404.</p>
    <p>Writes a digital output (DO) signal on the ABB GoFa controller via RWS.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A number (<code>0</code> or <code>1</code>) — value to write to the configured signal</li>
        <li>An object <code>{ signal: 'DO10_1', value: 1 }</code> — overrides both signal name and value</li>
        <li><code>null</code> / not set — uses the configured defaults</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, signal: 'DO10_1', value: 1 }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
