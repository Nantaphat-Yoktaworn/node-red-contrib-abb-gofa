<script type="text/javascript">
    RED.nodes.registerType('gofa-do-write', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            signal:    { value: 'ABB_Scalable_IO_0_DO1' },
            value:     { value: 1, validate: RED.validators.number() },
            transport: { value: 'rws' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || ('DO ' + this.signal); },
        paletteLabel: 'DO Write',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function updateState() {
                var id = robotId();
                var sig = $('#node-input-signal').val() || '';
                if (!id) {
                    $('#gofa-do-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                if (!sig) {
                    $('#gofa-do-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">Enter a signal name first</span>');
                    return;
                }
                $.getJSON('gofa-do-write/' + id + '/read', { signal: sig })
                    .done(function(data) {
                        var color = data.value === 1 ? '#5cb85c' : '#777';
                        var text = data.value === 1 ? 'High (1)' : 'Low (0)';
                        var html = '<div style="display: flex; align-items: center;">' +
                            '<span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background-color: ' + color + '; margin-right: 6px; border: 1px solid #444;"></span>' +
                            '<span><b>State:</b> ' + text + '</span>' +
                            '</div>';
                        $('#gofa-do-status').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to read state';
                        $('#gofa-do-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    });
            }
            function writeDo(value) {
                var id = robotId();
                var sig = $('#node-input-signal').val() || '';
                var transport = $('#node-input-transport').val() || 'rws';
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');
                if (!sig) return RED.notify('Enter a signal name first', 'warning');
                
                var btn = value === 1 ? $('#gofa-do-set-high') : $('#gofa-do-set-low');
                var other = value === 1 ? $('#gofa-do-set-low') : $('#gofa-do-set-high');
                btn.prop('disabled', true);
                other.prop('disabled', true);

                $.ajax({
                    url: 'gofa-do-write/' + id + '/write',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ signal: sig, value: value, transport: transport })
                })
                    .done(function() {
                        RED.notify('Signal successfully set to ' + (value === 1 ? 'High (1)' : 'Low (0)'), 'success');
                        updateState();
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Command failed';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                        other.prop('disabled', false);
                    });
            }
            $('#gofa-do-set-high').on('click', function(e) { e.preventDefault(); writeDo(1); });
            $('#gofa-do-set-low').on('click', function(e) { e.preventDefault(); writeDo(0); });
            
            $('#node-input-signal').on('change', function() {
                updateState();
            });
            // Initial load
            updateState();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-do-write">
    <div class="form-row" style="background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:8px;margin-bottom:8px;">
        <i class="fa fa-exclamation-triangle" style="color:#856404;"></i>
        <span style="color:#856404;font-weight:bold;"> Requires external I/O module</span><br>
        <span style="color:#856404;font-size:0.9em;">Signal will not exist (HTTP 404) unless a digital I/O expansion module is fitted to the controller.</span>
    </div>
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-signal"><i class="fa fa-bolt"></i> Signal</label>
        <input type="text" id="node-input-signal" placeholder="ABB_Scalable_IO_0_DO1">
    </div>
    <div class="form-row">
        <label for="node-input-value"><i class="fa fa-toggle-on"></i> Value</label>
        <input type="number" id="node-input-value" min="0" max="1" placeholder="1">
    </div>
    <div class="form-row">
        <label for="node-input-transport"><i class="fa fa-exchange"></i> Transport</label>
        <select id="node-input-transport">
            <option value="rws">RWS (requires Access Level: All)</option>
            <option value="socket">Socket (requires RAPID running)</option>
            <option value="background">Background task (works while T_ROB1 is stopped)</option>
        </select>
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Current State</label>
        <span id="gofa-do-status">Select a robot to load state.</span>
    </div>
    <div class="form-row" style="display: flex; gap: 5px;">
        <button id="gofa-do-set-high" class="editor-button" style="flex-grow: 1;"><i class="fa fa-toggle-on"></i> Write High (1)</button>
        <button id="gofa-do-set-low" class="editor-button" style="flex-grow: 1;"><i class="fa fa-toggle-off"></i> Write Low (0)</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-do-write">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p><b>⚠ Requires external I/O module.</b> Digital output signals (DO) do not exist on the base OmniCore C30 — an expansion I/O module must be fitted and configured. Without it, this node returns HTTP 404.</p>
    <p>Writes a digital output (DO) signal on the ABB GoFa controller, via one of three transports:</p>
    <ul>
        <li><b>RWS</b> (default) — <code>POST /rw/iosystem/signals/{name}/set-value</code>. Requires the signal's <code>Access Level</code> to be set to <code>All</code> in RobotStudio (<code>Controller</code> → <code>Configuration</code> → <code>I/O System</code> → <code>Signal</code>; needs a controller restart). Left at the factory default, RWS correctly rejects the write with <code>403</code>.</li>
        <li><b>Socket</b> — sends the write over the T_ROB1 TCP socket instead (RAPID's <code>SetDO</code>, via an explicit per-signal allow-list in <code>MainModule.mod</code>/<code>MainModuleEGM.mod</code>: <code>ABB_Scalable_IO_0_DO1</code>–<code>DO16</code>). Bypasses the RWS Access Level restriction entirely, since RAPID always has access to its own I/O — but needs RAPID actually running, and only works for signals already on that allow-list.</li>
        <li><b>Background task</b> — same <code>SetDO</code> mechanism as Socket, but sent to <code>BackgroundLed.mod</code> running in its own RAPID task (<code>robot.backgroundPort</code>, default 1026) instead of T_ROB1. Keeps working while T_ROB1 is stopped (e.g. during <code>gofa-leadthrough</code> hand-guiding), same allow-list as Socket. Requires the one-time RobotStudio task setup described in <code>CLAUDE.md</code>'s "Background LED task" section.</li>
    </ul>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li>A number (<code>0</code> or <code>1</code>) — value to write to the configured signal</li>
        <li>An object <code>{ signal: 'ABB_Scalable_IO_0_DO1', value: 1, transport: 'socket' }</code> — overrides signal name, value, and/or transport</li>
        <li><code>null</code> / not set — uses the configured defaults</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, signal: 'ABB_Scalable_IO_0_DO1', value: 1, transport: 'rws' }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
