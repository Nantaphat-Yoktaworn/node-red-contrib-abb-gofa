<script type="text/javascript">
    RED.nodes.registerType('gofa-motor', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:   { value:'' },
            robot:  { value:'', type:'gofa-robot', required:true },
            action: { value:'motoron' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || (this.action === 'motoron' ? 'Motors ON' : 'Motors OFF'); },
        paletteLabel: 'Motor On/Off',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function updateState() {
                var id = robotId();
                if (!id) {
                    $('#gofa-motor-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                $.getJSON('gofa-motor/' + id + '/read')
                    .done(function(data) {
                        var stateStr = data.ctrlstate === 'motoron' ? 'Motors ON' : 'Motors OFF';
                        var color = data.ctrlstate === 'motoron' ? '#5cb85c' : '#d9534f';
                        $('#gofa-motor-status').html('<span style="font-weight: bold; color: ' + color + ';">' + stateStr + '</span>');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to read state';
                        $('#gofa-motor-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    });
            }
            function setMotorState(action) {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');
                var btn = action === 'motoron' ? $('#gofa-motor-on') : $('#gofa-motor-off');
                var other = action === 'motoron' ? $('#gofa-motor-off') : $('#gofa-motor-on');
                btn.prop('disabled', true);
                other.prop('disabled', true);
                $.ajax({
                    url: 'gofa-motor/' + id + '/toggle',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ action: action })
                })
                    .done(function() {
                        RED.notify('Motors successfully set to ' + (action === 'motoron' ? 'ON' : 'OFF'), 'success');
                        updateState();
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Command failed';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                        other.prop('disabled', false);
                    });
            }
            $('#gofa-motor-on').on('click', function(e) {
                e.preventDefault();
                setMotorState('motoron');
            });
            $('#gofa-motor-off').on('click', function(e) {
                e.preventDefault();
                setMotorState('motoroff');
            });
            // Initial load
            updateState();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-motor">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-power-off"></i> Action</label>
        <select id="node-input-action">
            <option value="motoron">Motors ON</option>
            <option value="motoroff">Motors OFF</option>
        </select>
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Current State</label>
        <span id="gofa-motor-status">Select a robot to load state.</span>
    </div>
    <div class="form-row" style="display: flex; gap: 5px;">
        <button id="gofa-motor-on" class="editor-button" style="flex-grow: 1;"><i class="fa fa-power-off"></i> Turn Motors ON</button>
        <button id="gofa-motor-off" class="editor-button" style="flex-grow: 1;"><i class="fa fa-power-off"></i> Turn Motors OFF</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Motors ON">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-motor">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Enables or disables robot motors via RWS <code>POST /rw/panel/ctrl-state</code>.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>
            <ul>
                <li><b>string</b> — <code>'motoron'</code> or <code>'motoroff'</code></li>
                <li><b>object</b> — <code>{ action: 'motoron' }</code></li>
                <li><b>(absent)</b> — uses the <em>Action</em> dropdown (default: <code>motoron</code>)</li>
            </ul>
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Success: <code>{ ok: true, action: '...' }</code>. Failure (invalid action or RWS
        error): <code>{ ok: false, error: '...' }</code> — no <code>action</code> property.</dd>
    </dl>
</script>
