<script type="text/javascript">
    RED.nodes.registerType('gofa-motor', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:   { value:'' },
            robot:  { value:'', type:'gofa-robot', required:true },
            action: { value:'motoron' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || (this.action === 'motoron' ? 'Motors ON' : 'Motors OFF'); },
        paletteLabel: 'Motor On/Off'
    });
</script>
<script type="text/html" data-template-name="gofa-motor">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-power-off"></i> Action</label>
        <select id="node-input-action">
            <option value="motoron">Motors ON</option>
            <option value="motoroff">Motors OFF</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Motors ON">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-motor">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Enables or disables robot motors via RWS <code>POST /rw/panel/ctrl-state</code>.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>
            <ul>
                <li><b>string</b> — <code>'motoron'</code> or <code>'motoroff'</code></li>
                <li><b>object</b> — <code>{ action: 'motoron' }</code></li>
                <li><b>(absent)</b> — uses the <em>Action</em> dropdown (default: <code>motoron</code>)</li>
            </ul>
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Success: <code>{ ok: true, action: '...' }</code>. Failure (invalid action or RWS
        error): <code>{ ok: false, error: '...' }</code> — no <code>action</code> property.</dd>
    </dl>
</script>
