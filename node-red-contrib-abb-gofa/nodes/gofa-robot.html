<script type="text/javascript">
    RED.nodes.registerType('gofa-robot', {
        category: 'config',
        defaults: {
            name:        { value: '' },
            ip:          { value: '192.168.125.1', required: true },
            rwsPort:     { value: '443',  required: true },
            socketPort:  { value: '1025', required: true },
            backgroundPort: { value: '1026' },
            username:    { value: 'Default User' },
            pointsFile:  { value: 'points.json' },
            remotePointsPath: { value: '$HOME/Programs/gofa_points.json' },
            jointLimits: { value: '' },
            allowInsecureLiveControl: { value: false }
        },
        credentials: { password: { type: 'password' } },
        icon: 'gofa.svg',
        label: function() { return this.name || this.ip || 'ABB-GoFa-12'; },
        oneditprepare: function() {
            var node = this;
            $('#node-config-discover-ip').on('click', function(e) {
                e.preventDefault();
                var rwsPort = $('#node-config-input-rwsPort').val() || '443';
                var btn = $(this);
                var origHtml = btn.html();
                btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> Scanning...');
                
                $.ajax({
                    url: 'gofa-robot/discover',
                    data: { rwsPort: rwsPort },
                    dataType: 'json',
                    success: function(ips) {
                        btn.prop('disabled', false).html(origHtml);
                        $('#gofa-discover-select-dialog').remove();
                        if (!ips || ips.length === 0) {
                            RED.notify('No ABB GoFa controllers discovered on the network', 'warning');
                        } else if (ips.length === 1) {
                            $('#node-config-input-ip').val(ips[0]);
                            RED.notify('Discovered and set IP to ' + ips[0], 'success');
                        } else {
                            var selectHtml = '<div id="gofa-discover-select-dialog" style="margin-top: 5px; display: flex; align-items: center;">' +
                                '<label style="width: auto; margin-right: 5px; margin-bottom: 0;">Select Robot:</label>' +
                                '<select id="gofa-discover-select-ip" style="flex-grow: 1; margin-right: 5px; width: auto;">';
                            ips.forEach(function(ip) {
                                selectHtml += '<option value="' + ip + '">' + ip + '</option>';
                            });
                            selectHtml += '</select>' +
                                '<button id="gofa-discover-select-btn" class="editor-button" style="width: auto;">Select</button>' +
                                '</div>';
                            
                            btn.closest('.form-row').after(selectHtml);
                            
                            $('#gofa-discover-select-btn').on('click', function(e2) {
                                e2.preventDefault();
                                var selectedIp = $('#gofa-discover-select-ip').val();
                                $('#node-config-input-ip').val(selectedIp);
                                $('#gofa-discover-select-dialog').remove();
                                RED.notify('Selected IP ' + selectedIp, 'success');
                            });
                        }
                    },
                    error: function(xhr, textStatus, errorThrown) {
                        btn.prop('disabled', false).html(origHtml);
                        RED.notify('Discovery failed: ' + errorThrown, 'error');
                    }
                });
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-robot">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="ABB-GoFa-12">
    </div>
    <div class="form-row" style="display: flex; align-items: center;">
        <label for="node-config-input-ip" style="margin-bottom: 0;"><i class="fa fa-globe"></i> Robot IP</label>
        <div style="flex-grow: 1; display: flex;">
            <input type="text" id="node-config-input-ip" placeholder="192.168.125.1" style="flex-grow: 1; width: auto; margin-right: 5px;">
            <button id="node-config-discover-ip" class="editor-button" style="width: auto; white-space: nowrap;"><i class="fa fa-search"></i> Discover</button>
        </div>
    </div>
    <div class="form-row">
        <label for="node-config-input-rwsPort"><i class="fa fa-plug"></i> RWS Port</label>
        <input type="number" id="node-config-input-rwsPort" placeholder="443">
    </div>
    <div class="form-row">
        <label for="node-config-input-socketPort"><i class="fa fa-plug"></i> Socket Port</label>
        <input type="number" id="node-config-input-socketPort" placeholder="1025">
    </div>
    <div class="form-row">
        <label for="node-config-input-backgroundPort"><i class="fa fa-lightbulb-o"></i> Background Services Port</label>
        <input type="number" id="node-config-input-backgroundPort" placeholder="1026">
        <span style="color:#888;font-size:0.85em;margin-left:6px">optional — used by gofa-asi-led's/gofa-do-write's "Background task"/"Background" transport; see BackgroundLed.mod</span>
    </div>
    <div class="form-row">
        <label for="node-config-input-username"><i class="fa fa-user"></i> Username</label>
        <input type="text" id="node-config-input-username" placeholder="Default User">
    </div>
    <div class="form-row">
        <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
        <input type="password" id="node-config-input-password" placeholder="required">
    </div>
    <div class="form-row">
        <label for="node-config-input-pointsFile"><i class="fa fa-file"></i> Points File</label>
        <input type="text" id="node-config-input-pointsFile" placeholder="points.json">
    </div>
    <div class="form-row">
        <label for="node-config-input-remotePointsPath"><i class="fa fa-globe"></i> Remote Points Path</label>
        <input type="text" id="node-config-input-remotePointsPath" placeholder="$HOME/Programs/gofa_points.json">
    </div>
    <div class="form-row">
        <label for="node-config-input-jointLimits"><i class="fa fa-shield"></i> Joint Limits</label>
        <input type="text" id="node-config-input-jointLimits" placeholder="[[-270,270],[-180,180],[-225,85],[-180,180],[-180,180],[-270,270]]">
        <span style="color:#888;font-size:0.85em;margin-left:6px">optional — leave blank for CRB 15000-12 defaults; JSON array of 6 [min,max] pairs (deg) to enforce tighter cell axis limits</span>
    </div>
    <div class="form-row">
        <label for="node-config-input-allowInsecureLiveControl" style="width:auto"><i class="fa fa-unlock-alt"></i> Allow insecure live control</label>
        <input type="checkbox" id="node-config-input-allowInsecureLiveControl" style="display:inline-block; width:auto; vertical-align:top;">
        <span style="color:#888;font-size:0.85em;margin-left:6px">only tick if this Node-RED has no adminAuth but is protected by network isolation — see help</span>
    </div>
</script>
<script type="text/html" data-help-name="gofa-robot">
    <p>Connection settings for ABB-GoFa-12. Shared by all GoFa nodes.</p>
    <p>The RWS session cookie is shared across all nodes — only one login per restart. The
    controller allows up to 70 RWS sessions total, but that drops to 19 once any WebSocket
    subscription is active (e.g. a <code>gofa-subscribe-io</code>/<code>-state</code>/<code>-elog</code>
    node) — repeated redeploys without a clean logout can leak sessions toward that lower limit
    and eventually lock out the FlexPendant with "too many device login".</p>
    <p>Points file is loaded at startup and kept in memory; all changes are persisted immediately.</p>
    <p><b>Remote Points Path</b> — used instead of the local Points File when a point node's
    <em>Storage</em> is set to <b>On-Robot</b>. A plain JSON file on the robot controller's own
    disk (managed purely via RWS <code>fileservice</code> <code>GET</code>/<code>PUT</code>, same
    mechanism as <b>gofa-file</b>) — no local file needed on the
    Node-RED host. Same best-effort protection as the local Points File's changed-on-disk
    check: a save re-fetches the remote file right before writing and warns (doesn't block) if
    it changed since it was last read — doesn't fully close the race, but turns a previously
    silent overwrite into a visible warning, fine for a human-paced "teach a point" workflow.</p>
    <p><b>Joint Limits</b> — soft per-axis limits (degrees) that <b>gofa-movej</b> checks before
    sending an absolute joint move, so an out-of-range target returns a clean error instead of
    faulting RAPID. Leave blank to use the CRB 15000-12 hardware working range
    (<code>[[-270,270],[-180,180],[-225,85],[-180,180],[-180,180],[-270,270]]</code>). Set a JSON
    array of six <code>[min,max]</code> pairs to enforce tighter limits (e.g. a cell with a
    restricted axis range). An invalid value is ignored (a warning is logged) and the defaults
    are used. Does not apply to Cartesian moves (<b>gofa-go-point</b>), which would need inverse
    kinematics to know the joint angles.</p>
    <p><b>Allow insecure live control</b> — the interactive buttons in every node's edit dialog
    ("Jog Now", "Move Joints Now", "Motors On", …) call admin HTTP endpoints that move the robot.
    Node-RED only authenticates those endpoints when <b>adminAuth</b> is configured; without it,
    anyone who can reach the editor port can trigger motion. For safety, these endpoints are
    <b>refused (403) when adminAuth is not configured</b>. Tick this box only if this Node-RED
    instance has no adminAuth but is genuinely protected another way (an isolated cell network,
    firewall, or reverse proxy) — it re-enables the editor motion buttons at your own risk.
    Deployed flows are never affected by this setting (they don't use the admin endpoints);
    configuring adminAuth is the recommended option.</p>
</script>
