<script type="text/javascript">
    RED.nodes.registerType('gofa-jog', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true },
            axis:  { value: 'X' },
            dir:   { value: '+' },
            step:  { value: 10 }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || ('Jog ' + this.axis + this.dir + this.step); },
        paletteLabel: 'Jog',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function performJog() {
                var id = robotId();
                var axis = $('#node-input-axis').val() || 'X';
                var dir = $('#node-input-dir').val() || '+';
                var step = $('#node-input-step').val() || '10';

                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                if (!confirm('WARNING: The robot will execute a relative jog movement of ' + axis + dir + step + '. Ensure the path is clear. Proceed?')) {
                    return;
                }

                var btn = $('#gofa-jog-btn').prop('disabled', true);
                RED.notify('Jogging robot...', 'info');

                $.ajax({
                    url: 'gofa-jog/' + id + '/jog',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ axis: axis, dir: dir, step: step })
                })
                    .done(function(data) {
                        RED.notify('Jog command acknowledged successfully: ' + data.ack, 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Jog command failed';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            $('#gofa-jog-btn').on('click', function(e) {
                e.preventDefault();
                performJog();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-jog">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-axis"><i class="fa fa-arrows"></i> Axis</label>
        <select id="node-input-axis">
            <option value="X">X — Forward/Back (mm, base frame)</option>
            <option value="Y">Y — Left/Right (mm, base frame)</option>
            <option value="Z">Z — Up/Down (mm, base frame)</option>
            <option value="RX">RX — Roll (deg, tool frame)</option>
            <option value="RY">RY — Pitch (deg, tool frame)</option>
            <option value="RZ">RZ — Yaw (deg, tool frame)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-dir"><i class="fa fa-exchange"></i> Direction</label>
        <select id="node-input-dir">
            <option value="+">+ (positive)</option>
            <option value="-">- (negative)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-step"><i class="fa fa-sliders"></i> Step</label>
        <input type="number" id="node-input-step" placeholder="10" min="1" max="50">
        <span style="margin-left:4px">mm (or deg for rotation, max 30)</span>
    </div>
    <div class="form-row">
        <button id="gofa-jog-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-arrows"></i> Jog Now</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Jog X+10">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-jog">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Moves the robot TCP by a relative amount (Cartesian jog).</p>
    <h3>Input</h3>
    <p><code>msg.payload.axis</code>, <code>msg.payload.dir</code>, <code>msg.payload.step</code>
    override the configured values. Each is validated and the message is rejected (no socket
    command sent) if invalid:</p>
    <ul>
        <li><code>axis</code> — must be (case-insensitive) one of <code>X</code>/<code>Y</code>/<code>Z</code>/<code>RX</code>/<code>RY</code>/<code>RZ</code></li>
        <li><code>dir</code> — must be exactly <code>"+"</code> or <code>"-"</code></li>
        <li><code>step</code> — a number; clamped to 1–50 mm for <code>X</code>/<code>Y</code>/<code>Z</code>, or 1–30° for <code>RX</code>/<code>RY</code>/<code>RZ</code></li>
    </ul>
    <h3>Output <code>msg.payload</code></h3>
    <p>Success:</p>
    <dl class="message-properties">
        <dt>ok</dt><dd>true if robot replied OK</dd>
        <dt>ack</dt><dd>Raw ack string</dd>
        <dt>token</dt><dd>Command sent (e.g. X+10)</dd>
    </dl>
    <p>Invalid input (bad axis/direction/step) or a connection-level failure:
    <code>msg.payload = { ok: false, error: "..." }</code>. A rejected socket command (robot
    replied but not with <code>OK:</code>) instead gives the <code>{ ok: false, ack, token }</code>
    shape above — <code>ok</code> is <code>false</code> and <code>ack</code> holds the raw
    rejection, with no <code>error</code> field.</p>
</script>
