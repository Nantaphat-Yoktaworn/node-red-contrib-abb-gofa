<script type="text/javascript">
    RED.nodes.registerType('gofa-pose', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false }, name: { value:'' }, robot: { value:'', type:'gofa-robot', required:true } },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Read Pose'; },
        paletteLabel: 'Read Pose',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function fetchPose() {
                var id = robotId();
                if (!id) {
                    $('#gofa-pose-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                var btn = $('#gofa-pose-fetch').prop('disabled', true);
                $('#gofa-pose-result').html('<i class="fa fa-spinner fa-spin"></i> Fetching...');
                $.getJSON('gofa-pose/' + id + '/read')
                    .done(function(data) {
                        var html = '<table class="red-ui-info-table" style="width: 100%; border-collapse: collapse;">' +
                            '<thead><tr><th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc;" colspan="2">Coordinates (mm)</th></tr></thead>' +
                            '<tbody>' +
                            '<tr><td style="font-weight: bold; padding: 4px; width: 40%;">X</td><td style="padding: 4px;">' + data.x.toFixed(2) + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Y</td><td style="padding: 4px;">' + data.y.toFixed(2) + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Z</td><td style="padding: 4px;">' + data.z.toFixed(2) + '</td></tr>' +
                            '</tbody>' +
                            '<thead><tr><th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc; padding-top: 10px;" colspan="2">Orientation (Quaternion)</th></tr></thead>' +
                            '<tbody>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Q1</td><td style="padding: 4px;">' + data.q1.toFixed(5) + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Q2</td><td style="padding: 4px;">' + data.q2.toFixed(5) + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Q3</td><td style="padding: 4px;">' + data.q3.toFixed(5) + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Q4</td><td style="padding: 4px;">' + data.q4.toFixed(5) + '</td></tr>' +
                            '</tbody>' +
                            '</table>';
                        $('#gofa-pose-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to fetch pose';
                        $('#gofa-pose-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            $('#gofa-pose-fetch').on('click', function(e) {
                e.preventDefault();
                fetchPose();
            });
            // Initial load
            fetchPose();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-pose">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Current Pose</label>
        <button id="gofa-pose-fetch" class="editor-button" style="width: auto;"><i class="fa fa-refresh"></i> Get Pose</button>
    </div>
    <div class="form-row">
        <div id="gofa-pose-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 50px;">
            Select a robot and click Get Pose.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Read Pose">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-pose">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads the current TCP pose. Any incoming message triggers a read; <code>msg.payload</code>
    itself is ignored on input.</p>
    <h3>Output <code>msg.payload</code></h3>
    <p>Success:</p>
    <dl class="message-properties">
        <dt>ok</dt><dd>true</dd>
        <dt>x, y, z</dt><dd>Position in mm (base frame)</dd>
        <dt>q1, q2, q3, q4</dt><dd>Quaternion orientation</dd>
        <dt>cf1, cf4, cf6, cfx</dt><dd>Robot configuration</dd>
    </dl>
    <p>Failure: <code>msg.payload = { ok: false, error: "..." }</code></p>
</script>
