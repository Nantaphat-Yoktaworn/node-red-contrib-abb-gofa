<script type="text/javascript">
    RED.nodes.registerType('gofa-setup', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: true },
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            module: { value: 'MainModule' },
            task:   { value: 'T_ROB1' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'One-Click Setup'; },
        paletteLabel: 'Setup',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function runSetup() {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');

                var moduleVal = $('#node-input-module').val() || 'MainModule';
                var taskVal = $('#node-input-task').val() || 'T_ROB1';

                var btn = $('#gofa-setup-start').prop('disabled', true);
                $('#gofa-setup-steps-list').html('<i class="fa fa-spinner fa-spin"></i> Initializing bring-up sequence...');

                $.ajax({
                    url: 'gofa-setup/' + id + '/start',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ module: moduleVal, task: taskVal })
                })
                    .done(function(data) {
                        RED.notify('One-Click Setup finished successfully!', 'success');
                        renderSteps(data.steps);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Setup failed';
                        RED.notify(err, 'error');
                        if (xhr.responseJSON && xhr.responseJSON.steps) {
                            renderSteps(xhr.responseJSON.steps);
                        } else {
                            $('#gofa-setup-steps-list').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                        }
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }

            function renderSteps(steps) {
                var html = '<table class="red-ui-info-table" style="width: 100%; border-collapse: collapse;">' +
                    '<thead><tr><th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc; width: 40%;">Step</th><th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc; width: 15%;">Status</th><th style="text-align: left; padding: 4px; border-bottom: 1px solid #ccc;">Details</th></tr></thead>' +
                    '<tbody>';
                steps.forEach(function(s) {
                    var statusStr = s.ok ? 'OK' : 'FAILED';
                    var color = s.ok ? '#5cb85c' : '#d9534f';
                    html += '<tr>' +
                        '<td style="font-weight: bold; padding: 4px; border-bottom: 1px solid #eee;">' + s.name + '</td>' +
                        '<td style="padding: 4px; border-bottom: 1px solid #eee; font-weight: bold; color: ' + color + ';">' + statusStr + '</td>' +
                        '<td style="padding: 4px; border-bottom: 1px solid #eee; font-size: 11px;">' + (s.detail || '') + '</td>' +
                        '</tr>';
                });
                html += '</tbody></table>';
                $('#gofa-setup-steps-list').html(html);
            }

            $('#gofa-setup-start').on('click', function(e) {
                e.preventDefault();
                runSetup();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-setup">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-module"><i class="fa fa-cube"></i> Module</label>
        <select id="node-input-module">
            <option value="MainModule">MainModule (default, no EGM)</option>
            <option value="MainModuleEGM">MainModuleEGM (adds EGM streaming)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-task"><i class="fa fa-cogs"></i> Task</label>
        <input type="text" id="node-input-task" placeholder="T_ROB1">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Initialize</label>
        <button id="gofa-setup-start" class="editor-button red-ui-button-active" style="width: auto; font-weight: bold;"><i class="fa fa-rocket"></i> Run One-Click Setup</button>
    </div>
    <div class="form-row">
        <div id="gofa-setup-steps-list" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 100px; max-height: 250px; overflow-y: auto;">
            Select a robot and click Run One-Click Setup.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="One-Click Setup">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-setup">
    <p>One-click first-run initialization. Send any message to run the whole
    bring-up sequence; when it finishes the robot is running the bundled RAPID
    socket-server module and every other node in this palette is ready to use.</p>

    <h3>Steps (in order, stops at the first failure)</h3>
    <ol>
        <li><b>preflight</b> — controller must be in <b>Auto</b> mode (RWS cannot
        change the operating mode; switch it on the FlexPendant if this fails)</li>
        <li><b>stop RAPID</b> — if currently running (module load requires stopped)</li>
        <li><b>unload conflicting module</b> — if the <em>other</em> module of the
        MainModule/MainModuleEGM pair is loaded (both declare <code>PROC main()</code>;
        leaving both loaded breaks start with "main ambiguous")</li>
        <li><b>upload</b> — the bundled <code>.mod</code> file is written to
        <code>$HOME/Programs/</code> with its <code>SERVER_IP</code> constant
        auto-synced to the config node's IP</li>
        <li><b>load module</b>, <b>reset program pointer</b> (Edit mastership,
        granted automatically)</li>
        <li><b>motors on</b>, <b>start RAPID</b> (verified — RWS reports 200 even
        for a rejected start)</li>
        <li><b>socket PING</b> — confirms the RAPID socket server is answering, and compares the
        module's reported <code>MODULE_VERSION</code> against this palette's own npm version;
        a mismatch is noted in the step's <code>detail</code> text (e.g. after editing
        <code>rapid/*.mod</code> without also bumping <code>MODULE_VERSION</code> to match) but
        does not fail the step — setup genuinely did succeed either way</li>
    </ol>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd><code>{ ok, module, task, steps: [{name, ok, detail}, …] }</code> — every
        step already run is in the report, including the failed one (with the reason
        in <code>detail</code>). On failure also <code>error</code>.</dd>
    </dl>

    <h3>Prerequisites (one-time, in RobotStudio — cannot be automated)</h3>
    <ul>
        <li>User account with <b>Remote Start/Stop</b> UAS grants</li>
        <li>Controller reachable on the LAN (use the <b>Discover</b> button in the
        robot config dialog to find its IP)</li>
        <li>For <code>MainModuleEGM</code>: the <code>EGM_PC</code> UDPUC transmission
        protocol configured (see the EGM docs)</li>
    </ul>
    <p><b>Output payload</b> is checked by default for this node — the per-step
    report is its main value. Uncheck to fire a bare signal instead.</p>
</script>
