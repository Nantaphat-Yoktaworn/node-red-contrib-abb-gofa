<script type="text/javascript">
    RED.nodes.registerType('gofa-grip', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:   { value: '' },
            robot:  { value: '', type: 'gofa-robot', required: true },
            action: { value: 'on' },
            signal: { value: 'ABB_Scalable_IO_0_DO1' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || ('Grip ' + (this.action || 'on').toUpperCase()); },
        paletteLabel: 'Grip',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function updateState() {
                var id = robotId();
                var sig = $('#node-input-signal').val() || '';
                if (!id) {
                    $('#gofa-grip-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                if (!sig) {
                    $('#gofa-grip-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">Enter a signal name first</span>');
                    return;
                }
                $.getJSON('gofa-grip/' + id + '/read', { signal: sig })
                    .done(function(data) {
                        var color = data.value === 1 ? '#5cb85c' : '#777';
                        var text = data.value === 1 ? 'Closed (ON)' : 'Open (OFF)';
                        var html = '<div style="display: flex; align-items: center;">' +
                            '<span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background-color: ' + color + '; margin-right: 6px; border: 1px solid #444;"></span>' +
                            '<span><b>State:</b> ' + text + '</span>' +
                            '</div>';
                        $('#gofa-grip-status').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to read state';
                        $('#gofa-grip-status').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    });
            }
            function triggerGrip(action) {
                var id = robotId();
                var sig = $('#node-input-signal').val() || '';
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');
                if (!sig) return RED.notify('Enter a signal name first', 'warning');
                
                var btn = action === 'on' ? $('#gofa-grip-close') : $('#gofa-grip-open');
                var other = action === 'on' ? $('#gofa-grip-open') : $('#gofa-grip-close');
                btn.prop('disabled', true);
                other.prop('disabled', true);

                $.ajax({
                    url: 'gofa-grip/' + id + '/toggle',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ action: action, signal: sig })
                })
                    .done(function() {
                        RED.notify('Gripper successfully set to ' + (action === 'on' ? 'Closed' : 'Open'), 'success');
                        updateState();
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Command failed';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                        other.prop('disabled', false);
                    });
            }
            $('#gofa-grip-close').on('click', function(e) { e.preventDefault(); triggerGrip('on'); });
            $('#gofa-grip-open').on('click', function(e) { e.preventDefault(); triggerGrip('off'); });

            $('#node-input-signal').on('change', function() {
                updateState();
            });

            function populateSignalDropdown() {
                var id = robotId();
                var sel = $('#node-input-signalSelect');
                sel.empty().append($('<option>', { value: '', text: 'Other (type below)' }));
                if (!id) return;
                $.getJSON('gofa-grip/' + id + '/signals')
                    .done(function(data) {
                        var current = $('#node-input-signal').val();
                        sel.empty().append($('<option>', { value: '', text: 'Other (type below)' }));
                        (data.signals || []).forEach(function(s) {
                            sel.append($('<option>', { value: s.name, text: s.name }));
                        });
                        if (current && (data.signals || []).some(function(s) { return s.name === current; })) {
                            sel.val(current);
                        }
                    });
            }
            $('#node-input-signalSelect').on('change', function() {
                var v = $(this).val();
                if (v) {
                    $('#node-input-signal').val(v).trigger('change');
                }
            });
            $('#node-input-robot').on('change', populateSignalDropdown);
            // Initial load
            populateSignalDropdown();
            updateState();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-grip">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-hand-grab-o"></i> Action</label>
        <select id="node-input-action" style="width:70%">
            <option value="on">ON — close gripper</option>
            <option value="off">OFF — open gripper</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-signalSelect"><i class="fa fa-list"></i> Known Signals</label>
        <select id="node-input-signalSelect" style="width:70%"></select>
    </div>
    <div class="form-row">
        <label for="node-input-signal"><i class="fa fa-plug"></i> DO Signal</label>
        <input type="text" id="node-input-signal" placeholder="ABB_Scalable_IO_0_DO1" style="width:70%">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Current State</label>
        <span id="gofa-grip-status">Select a robot to load state.</span>
    </div>
    <div class="form-row" style="display: flex; gap: 5px;">
        <button id="gofa-grip-close" class="editor-button" style="flex-grow: 1;"><i class="fa fa-hand-grab-o"></i> Close Gripper (ON)</button>
        <button id="gofa-grip-open" class="editor-button" style="flex-grow: 1;"><i class="fa fa-hand-paper-o"></i> Open Gripper (OFF)</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Grip">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-grip">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Controls a digital output signal for a gripper via RWS (<code>POST /rw/iosystem/signals/{signal}/set-value</code>). The signal's <code>Access Level</code> must be set to <code>All</code> in the controller's I/O configuration for this to work.</p>
    <p>The <b>Known Signals</b> dropdown lists live DO signals from the controller — pick one to fill the DO Signal field, or leave it on "Other (type below)" and type a name manually as before.</p>
    <h3>Input</h3>
    <p><code>msg.payload</code> can be:</p>
    <ul>
        <li><code>true</code>, <code>1</code>, <code>"on"</code>, or <code>"gripon"</code> — activate gripper</li>
        <li><code>false</code>, <code>0</code>, <code>"off"</code>, or <code>"gripoff"</code> — deactivate gripper</li>
        <li>An object <code>{ action: "on" }</code></li>
        <li><code>null</code> / not set — uses the configured default action</li>
    </ul>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, action: 'on', signal: 'ABB_Scalable_IO_0_DO1' }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
