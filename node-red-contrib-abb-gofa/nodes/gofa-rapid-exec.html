<script type="text/javascript">
    RED.nodes.registerType('gofa-rapid-exec', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:       { value: '' },
            robot:      { value: '', type: 'gofa-robot', required: true },
            action:     { value: 'start' },
            task:       { value: 'T_ROB1' },
            modulePath: { value: '$HOME/Programs/MainModule.mod' },
            replace:    { value: true }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() {
            var labels = { start: 'RAPID Start', stop: 'RAPID Stop', resetpp: 'RAPID Reset PP', loadmod: 'Load Module' };
            return this.name || labels[this.action] || 'RAPID Exec';
        },
        paletteLabel: 'RAPID Exec',
        oneditprepare: function() {
            function toggleLoadmodFields() {
                var show = $('#node-input-action').val() === 'loadmod';
                $('#node-loadmod-fields').toggle(show);
            }
            $('#node-input-action').on('change', toggleLoadmodFields);
            toggleLoadmodFields();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-rapid-exec">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-play"></i> Action</label>
        <select id="node-input-action">
            <option value="start">Start RAPID</option>
            <option value="stop">Stop RAPID</option>
            <option value="resetpp">Reset Program Pointer (PP)</option>
            <option value="loadmod">Load Module</option>
        </select>
    </div>
    <div id="node-loadmod-fields">
        <div class="form-row">
            <label for="node-input-task"><i class="fa fa-cogs"></i> Task</label>
            <input type="text" id="node-input-task" placeholder="T_ROB1">
        </div>
        <div class="form-row">
            <label for="node-input-modulePath"><i class="fa fa-folder"></i> Module path</label>
            <input type="text" id="node-input-modulePath" placeholder="$HOME/Programs/MainModule.mod">
        </div>
        <div class="form-row">
            <label for="node-input-replace" style="width:auto"><input type="checkbox" id="node-input-replace" style="display:inline-block; width:auto; vertical-align:top;"> Replace if already loaded</label>
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="RAPID Start">
    </div>
</script>
<script type="text/html" data-help-name="gofa-rapid-exec">
    <p>Controls RAPID program execution on the robot controller via RWS.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>
            <ul>
                <li><b>string</b> — <code>'start'</code>, <code>'stop'</code>, <code>'resetpp'</code>, or <code>'loadmod'</code></li>
                <li><b>object</b> — <code>{ action: 'start' }</code>, or for <code>loadmod</code>: <code>{ action: 'loadmod', task, modulePath, replace }</code> (any of the three override the node's configured values)</li>
                <li><b>(absent)</b> — uses the <em>Action</em> dropdown (default: <code>start</code>)</li>
            </ul>
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            <code>{ ok: true, action: '...' }</code> on success (for <code>loadmod</code>, also
            <code>task</code>, <code>modulePath</code>, and <code>module</code> — the name RWS
            reports as loaded).<br>
            On failure: <code>{ ok: false, action: '...', error: '...' }</code>, plus
            <code>ctrlstate</code> and/or <code>execstate</code> when the failure relates to
            motor/execution state (see <em>Notes</em> below).
        </dd>
    </dl>

    <h3>Actions</h3>
    <ul>
        <li><b>start</b> — begin RAPID execution (cycle: forever)</li>
        <li><b>stop</b> — halt RAPID execution</li>
        <li><b>resetpp</b> — move program pointer back to Main (requires Edit mastership)</li>
        <li><b>loadmod</b> — (re)load a module file already on the controller's disk into a
        task, e.g. after <b>gofa-upload-mod</b> has PUT a changed <code>MainModule.mod</code>.
        This is the RWS equivalent of the FlexPendant's <b>Load Module</b> step. Requires Edit
        mastership (granted automatically). Follow with <b>resetpp</b> if you also need the
        program pointer moved back to Main before <code>start</code>.</li>
    </ul>

    <h3>Notes</h3>
    <p>Controller must be in <b>AUTO</b> mode and motors must be ON before calling <code>start</code>.
    Use <b>gofa-motor</b> to enable motors first.</p>
    <p><b>Requires Remote Start/Stop UAS grant</b> — set in RobotStudio → Edit User Accounts.
    <b>resetpp</b> additionally requires Edit mastership (granted automatically by this node).</p>

    <h3>Detecting a failed start (RAPID error 20055 and similar)</h3>
    <p>RWS accepts <code>POST /rw/rapid/execution/start</code> with HTTP 200 even when the
    controller then immediately rejects it — e.g. RAPID error <b>20055</b> ("program must
    start in Motor On state"). The HTTP response alone can't reveal that, so an older version
    of this node would report <code>{ ok: true }</code> for a start that never actually ran.</p>
    <p>This node now verifies <code>start</code> two ways:</p>
    <ul>
        <li>Before sending the command, it checks <code>/rw/panel/ctrl-state</code>. If motors
        aren't on, it fails immediately with <code>Cannot start RAPID: motors are motoroff —
        turn Motors On first</code> — no request is even sent to the controller.</li>
        <li>After sending the command, it polls <code>/rw/rapid/execution</code> for up to
        1.5&nbsp;s to confirm <code>ctrlexecstate</code> actually reaches <code>running</code>.
        If it doesn't (a rejection RWS didn't surface synchronously), the node reports
        <code>RAPID did not start (motors are ...)</code> or points you at <b>gofa-elog</b>
        for the controller's own error detail.</li>
    </ul>
    <p><code>stop</code> and <code>resetpp</code> are unaffected — they don't have this
    silent-rejection failure mode, so no state is checked for them.</p>
</script>
