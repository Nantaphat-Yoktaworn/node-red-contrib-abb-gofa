<script type="text/javascript">
    RED.nodes.registerType('gofa-subscribe-var', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:     { value: '' },
            robot:    { value: '', type: 'gofa-robot', required: true },
            task:     { value: 'T_ROB1' },
            module:   { value: 'MainModule' },
            variable: { value: '' },
            interval: { value: 1000 }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || this.variable || 'Subscribe Var'; },
        paletteLabel: 'Subscribe Var'
    });
</script>
<script type="text/html" data-template-name="gofa-subscribe-var">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-task"><i class="fa fa-tasks"></i> Task</label>
        <input type="text" id="node-input-task" placeholder="T_ROB1">
    </div>
    <div class="form-row">
        <label for="node-input-module"><i class="fa fa-file-code-o"></i> Module</label>
        <input type="text" id="node-input-module" placeholder="MainModule">
    </div>
    <div class="form-row">
        <label for="node-input-variable"><i class="fa fa-tag"></i> Variable</label>
        <input type="text" id="node-input-variable" placeholder="myVar">
    </div>
    <div class="form-row">
        <label for="node-input-interval"><i class="fa fa-clock-o"></i> Interval (ms)</label>
        <input type="number" id="node-input-interval" placeholder="1000" min="100">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Subscribe Var">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-subscribe-var">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Polls the controller every N ms for a RAPID variable's value. Send a message to start polling; send again to stop (toggle).</p>
    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Task</dt><dd>RAPID task name (default: <code>T_ROB1</code>)</dd>
        <dt>Module</dt><dd>RAPID module name (e.g. <code>MainModule</code>)</dd>
        <dt>Variable</dt><dd>Variable name (e.g. <code>nTestVar</code>)</dd>
        <dt>Interval (ms)</dt><dd>Poll interval in milliseconds (default: <code>1000</code>)</dd>
    </dl>
    <h3>Input</h3>
    <p>Send any message to start polling. Send again to stop. Optionally override config at runtime with <code>msg.payload.task</code>, <code>msg.payload.module</code>, or <code>msg.payload.variable</code>.</p>
    <h3>Output <code>msg.payload</code></h3>
    <dl class="message-properties">
        <dt>ok <span class="property-type">boolean</span></dt><dd><code>true</code></dd>
        <dt>task <span class="property-type">string</span></dt><dd>RAPID task name</dd>
        <dt>module <span class="property-type">string</span></dt><dd>RAPID module name</dd>
        <dt>variable <span class="property-type">string</span></dt><dd>Variable name</dd>
        <dt>value <span class="property-type">string</span></dt><dd>Variable value — see Notes below on how current this is</dd>
        <dt>source <span class="property-type">string</span></dt><dd>always <code>"module-text"</code></dd>
        <dt>stale <span class="property-type">boolean</span></dt><dd>always <code>true</code> — see Notes</dd>
        <dt>warning <span class="property-type">string</span></dt><dd>explains why the value may not be current</dd>
    </dl>
    <h3>Notes</h3>
    <p>This node reads the module's source text off the controller filesystem and
    regex-matches <code>name := value</code>. <b>Confirmed live against a real OmniCore
    controller that this returns the compiled/declared value, not the variable's current
    runtime value</b> — writing a new value and polling here still shows the old one until the
    module is reloaded. RWS's generic live-symbol endpoint 404s on OmniCore (see the
    <code>abb-rws</code> skill), so there is currently no working way to poll a truly live
    value for a variable this way. For a genuinely live value, add the variable to
    <code>TryGetVar</code>/<code>TrySetVar</code> in <code>MainModule.mod</code> and use
    <code>gofa-rapid-var-read</code> (socket path) instead — this node's poll loop then
    round-trips a plain RWS file read every interval, which won't reflect changes made via
    <code>SETVAR</code> either.</p>
</script>
