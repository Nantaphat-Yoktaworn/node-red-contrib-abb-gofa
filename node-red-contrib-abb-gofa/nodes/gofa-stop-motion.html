<script type="text/javascript">
    RED.nodes.registerType('gofa-stop-motion', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Stop Motion'; },
        paletteLabel: 'Stop Motion',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function stopRobot() {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');
                
                var btn = $('#gofa-stop-btn').prop('disabled', true);
                RED.notify('Sending STOP command to robot...', 'info');
                $.ajax({
                    url: 'gofa-stop-motion/' + id + '/stop',
                    type: 'POST'
                })
                    .done(function() {
                        RED.notify('Robot stopped successfully', 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to stop robot';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            $('#gofa-stop-btn').on('click', function(e) {
                e.preventDefault();
                stopRobot();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-stop-motion">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <button id="gofa-stop-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-stop"></i> STOP MOTION IMMEDIATELY</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Stop Motion">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-stop-motion">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Sends a <code>STOP</code> command via the RAPID socket server — RAPID calls
    <code>StopMove</code>, <code>ClearPath</code>, <code>StartMove</code>.</p>
    <p><b>Since 2.4.2, this only cancels a queued move that hasn't started yet — it does not
    interrupt a <code>HOME</code>/<code>GOTOJ</code>/<code>GOTOL</code>/<code>MOVEJ</code>/
    <code>MOVEL</code> that's already executing</b> (removing <code>\Conc</code> from those
    instructions, to fix a RAPID queue-depth crash, meant giving up mid-move interruption as a
    trade-off — see the "\Conc queue-depth crash" note in <code>CLAUDE.md</code>). A jog
    (<code>X±</code>/<code>Y±</code>/<code>Z±</code>/<code>RX±</code>/<code>RY±</code>/
    <code>RZ±</code>/<code>J1-6±</code>) is still interrupted immediately — each jog does its own
    full stop/clear/restart before a single move, so it was never exposed to that crash.</p>
    <h3>Input</h3>
    <p>Any message triggers the stop. <code>msg.payload</code> is ignored.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "..." }</code> on failure.</p>
</script>
