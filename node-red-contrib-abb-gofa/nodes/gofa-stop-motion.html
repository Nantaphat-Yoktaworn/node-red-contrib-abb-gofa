<script type="text/javascript">
    RED.nodes.registerType('gofa-stop-motion', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true },
            mode:  { value: 'immediate' }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Stop Motion'; },
        paletteLabel: 'Stop Motion',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function stopRobot() {
                var id = robotId();
                if (!id) return RED.notify('Select (and deploy) a robot config first', 'warning');
                
                var btn = $('#gofa-stop-btn').prop('disabled', true);
                RED.notify('Sending STOP command to robot...', 'info');
                $.ajax({
                    url: 'gofa-stop-motion/' + id + '/stop',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ mode: $('#node-input-mode').val() || 'immediate' })
                })
                    .done(function() {
                        RED.notify('Robot stopped successfully', 'success');
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to stop robot';
                        RED.notify(err, 'error');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            $('#gofa-stop-btn').on('click', function(e) {
                e.preventDefault();
                stopRobot();
            });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-stop-motion">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-stop-circle"></i> Stop mode</label>
        <select id="node-input-mode">
            <option value="immediate">Immediate — halt an in-progress move now (RWS stop + auto-restart)</option>
            <option value="queued">Queued — socket STOP, takes effect after the current move</option>
        </select>
    </div>
    <div class="form-row">
        <button id="gofa-stop-btn" class="editor-button" style="width: 100%; font-weight: bold;"><i class="fa fa-stop"></i> STOP MOTION IMMEDIATELY</button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Stop Motion">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-stop-motion">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <h3>Stop mode</h3>
    <ul>
        <li><b>Immediate</b> (default) — halts an in-progress
        <code>HOME</code>/<code>GOTOJ</code>/<code>GOTOL</code>/<code>MOVEJ</code>/<code>MOVEL</code>
        <em>right away</em> using an RWS execution-stop, then automatically
        <code>resetPP</code> + <code>start</code>s to bring the socket server back. The arm halts
        where it is and stays there (it does <b>not</b> move to home); the controller program
        restarts underneath (~1–2&nbsp;s), after which it's ready for the next command. Needs the
        controller in <b>Auto with motors on</b> (required to restart). Does not need any
        particular module version.</li>
        <li><b>Queued</b> — the legacy socket <code>STOP</code> (<code>StopMove</code>/
        <code>ClearPath</code>/<code>StartMove</code>). Doesn't restart the program, but the serve
        loop can't process it until the current blocking move finishes, so it only cancels a move
        that hasn't started yet (or halts a jog).</li>
    </ul>
    <p>A jog (<code>X±</code>/<code>J1-6±</code>/…) is halted immediately by either mode.
    Neither mode is a safety function — the safety controller and physical e-stop are the only
    real safety layer.</p>
    <h3>Input</h3>
    <p>Any message triggers the stop. A bare <code>msg.payload</code> of <code>"immediate"</code>
    or <code>"queued"</code> (or <code>msg.payload.mode</code>) overrides the configured mode;
    any other payload is ignored and the configured mode is used.</p>
    <h3>Output</h3>
    <p><code>msg.payload = { ok: true, mode }</code> on success.</p>
    <p><code>msg.payload = { ok: false, error: "...", mode }</code> on failure.</p>
</script>
