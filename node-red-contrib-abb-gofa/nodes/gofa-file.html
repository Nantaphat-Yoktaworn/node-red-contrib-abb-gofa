<script type="text/javascript">
    RED.nodes.registerType('gofa-file', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:       { value: '' },
            robot:      { value: '', type: 'gofa-robot', required: true },
            action:     { value: 'download' },
            localPath:  { value: '' },
            remotePath: { value: '$HOME/Programs/MainModule.mod' },
            encoding:   { value: 'utf8' },
            autoChangeIp: { value: false }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() {
            var a = this.action || 'download';
            var titles = {download:'File Download', upload:'File Upload', delete:'File Delete'};
            return this.name || titles[a];
        },
        paletteLabel: 'File',
        oneditprepare: function() {
            var toggleFields = function() {
                var val = $('#node-input-action').val();
                $('.node-row-download').toggle(val === 'download');
                $('.node-row-upload').toggle(val === 'upload');
                $('.node-row-delete').toggle(val === 'delete');
                $('.node-row-remotePath').toggle(val === 'download' || val === 'upload' || val === 'delete');
            };
            $('#node-input-action').on('change', toggleFields);
            toggleFields();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-file">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-play"></i> Action</label>
        <select id="node-input-action">
            <option value="download">Download</option>
            <option value="upload">Upload</option>
            <option value="delete">Delete</option>
        </select>
    </div>
    <div class="form-row node-row-upload">
        <label for="node-input-localPath"><i class="fa fa-file"></i> Local path</label>
        <input type="text" id="node-input-localPath" placeholder="/data/local_file.mod">
    </div>
    <div class="form-row node-row-upload">
        <input type="checkbox" id="node-input-autoChangeIp" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-autoChangeIp" style="width:auto;"><i class="fa fa-refresh"></i> Auto change IP to match robot configuration</label>
    </div>
    <div class="form-row node-row-remotePath">
        <label for="node-input-remotePath"><i class="fa fa-file-text-o"></i> Remote path</label>
        <input type="text" id="node-input-remotePath" placeholder="$HOME/Programs/MainModule.mod">
    </div>
    <div class="form-row node-row-download">
        <label for="node-input-encoding"><i class="fa fa-font"></i> Encoding</label>
        <select id="node-input-encoding">
            <option value="utf8">UTF-8 (text)</option>
            <option value="base64">Base64 (binary)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-file">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Manages files on the robot controller filesystem via RWS fileservice.</p>
    
    <h3>Input</h3>
    <p><code>msg.payload.action</code> can override the configured action (e.g. <code>"download"</code>, <code>"upload"</code>, or <code>"delete"</code>). Otherwise, bare payloads are interpreted as paths depending on the action:</p>
    <ul>
        <li><b>Download / Delete</b>: A string <code>msg.payload</code> overrides the <b>Remote path</b>.</li>
        <li><b>Upload</b>: A string <code>msg.payload</code> overrides the <b>Local path</b>. A Buffer <code>msg.payload</code> provides the file content directly.</li>
    </ul>
    
    <h3>Actions</h3>
    <ul>
        <li><b>Download</b>: Reads a file from the controller. Output is a success object with <code>ok: true</code>, <code>remotePath</code>, <code>content</code> (UTF-8 or Base64 string), and <code>bytes</code>.</li>
        <li><b>Upload</b>: Writes a file to the controller. Output is a success object with <code>ok: true</code>, <code>remotePath</code>, <code>bytes</code>, and <code>serverIpInjected</code>. Note: when uploading UTF-8 content and <b>Auto change IP</b> is checked, the node will automatically patch the <code>SERVER_IP</code> constant in RAPID modules to match the Node-RED server's IP.</li>
        <li><b>Delete</b>: Removes a file from the controller. Output is a success object with <code>ok: true</code>, <code>remotePath</code>, and <code>deleted: true</code>.</li>
    </ul>

    <h3>Common paths</h3>
    <ul>
        <li><code>$HOME/Programs/MainModule.mod</code> — main RAPID module</li>
        <li><code>$HOME/Programs/gofa_home.cfg</code> — saved home position</li>
    </ul>
</script>
