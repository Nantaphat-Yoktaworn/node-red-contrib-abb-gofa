<script type="text/javascript">
    RED.nodes.registerType('gofa-connection-status', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:  { value: '' },
            robot: { value: '', type: 'gofa-robot', required: true }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || 'Connection Status'; },
        paletteLabel: 'Connection Status',
        oneditprepare: function() {
            var node = this;
            function robotId() {
                var v = $('#node-input-robot').val();
                return (v && v !== '_ADD_') ? v : null;
            }
            function testConnection() {
                var id = robotId();
                if (!id) {
                    $('#gofa-conn-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">Select (and deploy) a robot config first</span>');
                    return;
                }
                var btn = $('#gofa-conn-test').prop('disabled', true);
                $('#gofa-conn-result').html('<i class="fa fa-spinner fa-spin"></i> Checking...');
                $.getJSON('gofa-connection-status/' + id + '/test')
                    .done(function(data) {
                        var rwsIcon = data.rws.ok ? '<i class="fa fa-check-circle" style="color: #5cb85c;"></i> Reachable' : '<i class="fa fa-times-circle" style="color: #d9534f;"></i> Unreachable';
                        var socketIcon = data.socket.ok ? '<i class="fa fa-check-circle" style="color: #5cb85c;"></i> Reachable (' + data.socket.rtt + 'ms)' : '<i class="fa fa-times-circle" style="color: #d9534f;"></i> Unreachable';
                        var bgIcon = data.background.ok ? '<i class="fa fa-check-circle" style="color: #5cb85c;"></i> Reachable (' + data.background.rtt + 'ms)' : '<i class="fa fa-times-circle" style="color: #d9534f;"></i> Unreachable';

                        var html = '<table class="red-ui-info-table" style="width: 100%; border-collapse: collapse;">' +
                            '<tr><td style="font-weight: bold; padding: 4px; width: 40%;">RWS Connection</td><td style="padding: 4px;">' + rwsIcon + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Socket Connection (T_ROB1)</td><td style="padding: 4px;">' + socketIcon + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Background Task</td><td style="padding: 4px;">' + bgIcon + '</td></tr>' +
                            '<tr><td style="font-weight: bold; padding: 4px;">Robot IP</td><td style="padding: 4px;">' + data.ip + '</td></tr>' +
                            '</table>';
                        if (data.errors && data.errors.length > 0) {
                            html += '<div style="margin-top: 8px; color: #d9534f; font-size: 11px;"><b>Errors:</b><ul>';
                            data.errors.forEach(function(e) {
                                html += '<li>' + e + '</li>';
                            });
                            html += '</ul></div>';
                        }
                        $('#gofa-conn-result').html(html);
                    })
                    .fail(function(xhr) {
                        var err = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed to check connection';
                        $('#gofa-conn-result').html('<span style="color: var(--red-ui-text-color-error, #f00);">' + err + '</span>');
                    })
                    .always(function() {
                        btn.prop('disabled', false);
                    });
            }
            $('#gofa-conn-test').on('click', function(e) {
                e.preventDefault();
                testConnection();
            });
            // Initial load
            testConnection();
        }
    });
</script>
<script type="text/html" data-template-name="gofa-connection-status">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row" style="display: flex; align-items: center; justify-content: space-between;">
        <label style="margin-bottom: 0;"><i class="fa fa-info-circle"></i> Connection Status</label>
        <button id="gofa-conn-test" class="editor-button" style="width: auto;"><i class="fa fa-refresh"></i> Test Connection</button>
    </div>
    <div class="form-row">
        <div id="gofa-conn-result" style="background: var(--red-ui-tertiary-background, #f3f3f3); padding: 10px; border: 1px solid var(--red-ui-form-input-border, #ccc); border-radius: 4px; min-height: 50px;">
            Select a robot and click Test Connection.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Connection Status">
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-connection-status">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node.
    Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Checks connectivity to the controller on both layers this palette uses — RWS (HTTPS) and
    the RAPID TCP socket server — independently of each other, so a robot that's reachable over
    one but not the other is reported clearly instead of just erroring out. <code>msg.payload</code>
    itself is ignored on input.</p>
    <p>Unlike <code>gofa-status</code>, this node doesn't assume RWS already works — each of the
    four RWS calls, the T_ROB1 socket ping, and the background-task ping run as independent
    checks, so "RWS unreachable", "socket unreachable", and "background task unreachable" are
    reported separately rather than the whole node just throwing.</p>
    <h3>Output <code>msg.payload</code></h3>
    <dl class="message-properties">
        <dt>ok</dt><dd>true only if both RWS and the T_ROB1 socket server responded</dd>
        <dt>ip</dt><dd>the configured robot IP being checked</dd>
        <dt>rws</dt><dd>
            <code>{ ok, motors, mode, rapid, speed }</code> — <code>ok</code> is true if at least
            one of the four RWS calls succeeded; fields for calls that failed are <code>null</code>.
            <code>speed</code> is the FlexPendant/production-window override (RWS
            <code>speedratio</code>) — a separate value from <b>gofa-speed-set</b>'s override
            (RAPID <code>VelSet</code>), see CLAUDE.md's <code>SPEED</code>/<code>SpeedRefresh</code> note
        </dd>
        <dt>socket</dt><dd>
            <code>{ ok: true, rtt }</code> on success (round-trip time in ms), or
            <code>{ ok: false, error }</code> on failure — this is T_ROB1's socket
            (<code>MainModule.mod</code>), which goes down whenever RAPID/T_ROB1 is stopped
            (teach workflow, EGM session)
        </dd>
        <dt>background</dt><dd>
            same shape as <code>socket</code>, but for <code>BackgroundLed.mod</code>'s separate
            RAPID task (<code>robot.backgroundPort</code>). Since that task survives T_ROB1 being
            stopped, comparing <code>socket.ok</code> and <code>background.ok</code> distinguishes
            "T_ROB1 specifically wedged/stopped" (socket down, background up) from "whole
            controller unreachable" (both down)
        </dd>
        <dt>moduleVersion</dt><dd>
            <code>{ expected, socket: { version, status }, background: { version, status } }</code> —
            <code>expected</code> is this palette's own npm version; each ping's reported
            <code>MODULE_VERSION</code> is compared against it, <code>status</code> is
            <code>"match"</code>, <code>"mismatch"</code>, or <code>"unknown"</code> (the ping
            failed, or the module that answered predates this version-handshake feature and
            reports no version at all). A mismatch on an otherwise-healthy result sets the node's
            status to yellow instead of green
        </dd>
        <dt>egmActive</dt><dd>
            mirrors the shared <code>gofa-robot</code> config node's <code>_egmActive</code> flag —
            true while a <code>gofa-egm</code> session is streaming. An active EGM session
            deliberately keeps <code>rws.rapid</code> at <code>"running"</code> for its whole
            duration while closing T_ROB1's socket, the same shape as a genuine wedge; consumers
            that treat "running but socket down" as a fault (e.g. <code>flows/watchdog_flow.json</code>)
            must check this flag too, or they'll misdiagnose every EGM session
        </dd>
        <dt>errors</dt><dd>array of <code>"label: message"</code> strings, one per failed check</dd>
    </dl>
    <p>A degraded/unreachable result is still a successful run of this node (it did its job:
    telling you the robot isn't fully reachable) — it does not raise a Node-RED error, so this
    node is safe to poll on a timer without spamming the debug/error sidebar.</p>
</script>
