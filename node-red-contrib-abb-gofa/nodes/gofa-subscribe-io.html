<script type="text/javascript">
    RED.nodes.registerType('gofa-subscribe-io', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            outputPayload: { value: false },
            name:    { value: '' },
            robot:   { value: '', type: 'gofa-robot', required: true },
            signal:  { value: 'ABB_Scalable_IO_0_DI1' },
            oneshot: { value: false }
        },
        inputs: 1, outputs: 1, icon: 'gofa.svg',
        label: function() { return this.name || this.signal || 'Subscribe IO'; },
        paletteLabel: 'Subscribe IO'
    });
</script>
<script type="text/html" data-template-name="gofa-subscribe-io">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-signal"><i class="fa fa-bolt"></i> Signal</label>
        <input type="text" id="node-input-signal" placeholder="ABB_Scalable_IO_0_DI1">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Subscribe IO">
    </div>
    <div class="form-row">
        <label style="width:auto;margin-right:8px;" for="node-input-oneshot">
            <input type="checkbox" id="node-input-oneshot" style="width:auto;vertical-align:middle;margin-right:4px;">
            One-shot (poll once per inject, no continuous monitoring)
        </label>
    </div>
    <div class="form-row">
        <input type="checkbox" id="node-input-outputPayload" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-input-outputPayload" style="width:auto;"><i class="fa fa-bug"></i> Output payload (debug)</label>
    </div>
</script>
<script type="text/html" data-help-name="gofa-subscribe-io">
    <p><b>Output payload</b> unchecked (default): fires an empty signal to trigger the next node. Checked: outputs the full <code>msg.payload</code> described below.</p>
    <p>Reads or monitors an I/O signal via RWS.</p>
    <h3>Input</h3>
    <p>Send any message to trigger. Pass <code>msg.payload.signal</code> to override the configured signal name at runtime.</p>
    <h3>Output <code>msg.payload</code></h3>
    <dl class="message-properties">
        <dt>ok <span class="property-type">boolean</span></dt><dd><code>true</code></dd>
        <dt>signal <span class="property-type">string</span></dt><dd>Signal name</dd>
        <dt>value <span class="property-type">number</span></dt><dd>Signal value (0 or 1 for digital)</dd>
        <dt>source <span class="property-type">string</span></dt><dd><code>ws</code> | <code>poll</code> | <code>oneshot</code></dd>
    </dl>
    <h3>Modes</h3>
    <p><b>One-shot unchecked (default):</b> First inject starts WebSocket subscription (falls back to 500ms polling if the signal doesn't support subscription). Emits current value on every inject and on every state change.</p>
    <p><b>One-shot checked:</b> Each inject does a single GET and emits the current value. No persistent connection.</p>
</script>
