<script type="text/javascript">
    RED.nodes.registerType('gofa-delete-point', {
        category: 'ABB-GoFa-12', color: '#D3740C',
        defaults: {
            name:      { value: '' },
            robot:     { value: '', type: 'gofa-robot', required: true },
            pointName: { value: '' },
            storage:   { value: 'local' }
        },
        inputs: 1, outputs: 1, icon: 'white-globe.svg',
        label: function() { return this.name || 'Delete Point'; },
        paletteLabel: 'Delete Point',
        oneditprepare: function() {
            var node = this;
            function endpoint(robotId) {
                var storage = $('#node-input-storage').val();
                return '/gofa-robot/' + robotId + '/' + (storage === 'remote' ? 'remote-points' : 'points');
            }
            function loadPoints(robotId) {
                var sel = $('#node-input-pointName').empty()
                    .append($('<option value="">-- select point --</option>'));
                if (!robotId) return;
                $.getJSON(endpoint(robotId), function(pts) {
                    pts.forEach(function(p) {
                        sel.append($('<option>').val(p.name).text(p.name));
                    });
                    sel.val(node.pointName);
                });
            }
            loadPoints(node.robot);
            $('#node-input-robot').change(function() { loadPoints($(this).val()); });
            $('#node-input-storage').change(function() { loadPoints($('#node-input-robot').val()); });
        }
    });
</script>
<script type="text/html" data-template-name="gofa-delete-point">
    <div class="form-row">
        <label for="node-input-robot"><i class="fa fa-server"></i> Robot</label>
        <input type="text" id="node-input-robot">
    </div>
    <div class="form-row">
        <label for="node-input-storage"><i class="fa fa-database"></i> Storage</label>
        <select id="node-input-storage">
            <option value="local">Local (points.json)</option>
            <option value="remote">On-Robot</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-pointName"><i class="fa fa-trash"></i> Point</label>
        <select id="node-input-pointName" style="width:70%"></select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Delete Point">
    </div>
</script>
<script type="text/html" data-help-name="gofa-delete-point">
    <p>Deletes a saved point by name or ID.</p>
    <h3>Input</h3>
    <p><code>msg.payload.name</code> or <code>msg.payload.id</code> overrides the point to
    delete; <code>msg.payload.storage</code> (<code>"local"</code>/<code>"remote"</code>)
    overrides <em>Storage</em>.</p>
    <h3>Output</h3>
    <ul>
        <li>Deleted: <code>msg.payload = { ok: true, deleted: {...point}, points: [...remaining points] }</code></li>
        <li>Not found or error: <code>msg.payload = { ok: false, error: "..." }</code></li>
    </ul>
</script>
